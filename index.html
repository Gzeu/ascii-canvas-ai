<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Canvas Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1a1a1a;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .app-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .left-panel {
            width: 280px;
            background: #252525;
            border-right: 1px solid #3a3a3a;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #0a0a0a;
        }

        .header {
            background: #252525;
            border-bottom: 1px solid #3a3a3a;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            font-weight: 600;
            color: #00d4aa;
            text-decoration: none;
        }

        .canvas-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .canvas-wrapper {
            flex: 1;
            position: relative;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
        }

        #canvas {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            line-height: 1;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            background: #0a0a0a;
            border: 1px solid #3a3a3a;
            cursor: crosshair;
        }

        .status-bar {
            background: #252525;
            border-top: 1px solid #3a3a3a;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #b0b0b0;
        }

        .tool-section {
            padding: 16px;
            border-bottom: 1px solid #3a3a3a;
        }

        .tool-section h3 {
            font-size: 12px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .tool-btn {
            background: #3a3a3a;
            border: 1px solid #4a4a4a;
            color: #b0b0b0;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            transition: all 150ms;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            min-height: 60px;
        }

        .tool-btn:hover {
            background: #4a4a4a;
            border-color: #00d4aa;
            color: #ffffff;
            transform: translateY(-1px);
        }

        .tool-btn.active {
            background: #00d4aa;
            border-color: #00d4aa;
            color: #0a0a0a;
        }

        .tool-icon {
            font-size: 18px;
            line-height: 1;
        }

        .tool-label {
            font-size: 10px;
            text-align: center;
            line-height: 1.2;
        }

        #char-palette {
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
        }

        #char-palette .tool-btn {
            min-height: 40px;
            padding: 8px;
            font-size: 14px;
        }

        .header-btn {
            background: #3a3a3a;
            color: #b0b0b0;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #4a4a4a;
            font-family: 'JetBrains Mono', monospace;
            transition: all 150ms;
        }

        .header-btn:hover {
            background: #00d4aa;
            color: #0a0a0a;
            border-color: #00d4aa;
        }

        .templates-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }

        .template-btn {
            background: #3a3a3a;
            border: 1px solid #4a4a4a;
            color: #b0b0b0;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 500;
            transition: all 150ms;
            text-align: left;
        }

        .template-btn:hover {
            background: #4a4a4a;
            border-color: #00d4aa;
            color: #ffffff;
        }

        .template-title {
            font-weight: 600;
            margin-bottom: 2px;
        }

        .template-desc {
            font-size: 9px;
            opacity: 0.8;
        }
    </style>
</head>

        // RENDERING SYSTEM
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.fillStyle = '#ffffff';
            ctx.font = '14px JetBrains Mono';
            
            for (var row = 0; row < ROWS; row++) {
                for (var col = 0; col < COLS; col++) {
                    var char = grid[row][col];
                    if (char !== ' ') {
                        ctx.fillText(char, col * charWidth, row * charHeight);
                    }
                }
            }
            
            // Draw selection
            if (selection) {
                ctx.strokeStyle = '#00d4aa';
                ctx.lineWidth = 2;
                ctx.strokeRect(
                    selection.startCol * charWidth,
                    selection.startRow * charHeight,
                    (selection.endCol - selection.startCol + 1) * charWidth,
                    (selection.endRow - selection.startRow + 1) * charHeight
                );
            }
            
            updateInfo();
        }
        
        // INFO UPDATES
        function updateInfo() {
            document.getElementById('cursorPos').textContent = 
                lastPos ? lastPos.col + ', ' + lastPos.row : '0, 0';
            
            var toolName = currentTool.charAt(0).toUpperCase() + currentTool.slice(1);
            if (currentChar !== ' ') {
                toolName += ' (' + currentChar + ')';
            } else {
                toolName += ' (space)';
            }
            document.getElementById('currentTool').textContent = toolName;
            
            // Count characters and lines
            var charCount = 0;
            var lineCount = 0;
            
            for (var row = 0; row < ROWS; row++) {
                var hasContent = false;
                for (var col = 0; col < COLS; col++) {
                    if (grid[row][col] !== ' ') {
                        charCount++;
                        hasContent = true;
                    }
                }
                if (hasContent) {
                    lineCount++;
                }
            }
            
            document.getElementById('canvasSize').textContent = COLS + '×' + ROWS;
            document.getElementById('charCount').textContent = charCount;
            document.getElementById('lineCount').textContent = lineCount;
            
            // Selection info
            if (selection) {
                var width = selection.endCol - selection.startCol + 1;
                var height = selection.endRow - selection.startRow + 1;
                document.getElementById('selectionInfo').textContent = width + '×' + height;
            } else {
                document.getElementById('selectionInfo').textContent = 'None';
            }
        }
        
        // DRAWING FUNCTIONS
        function drawChar(row, col, char) {
            if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
                grid[row][col] = char;
                render();
            }
        }
        
        // Improved freehand drawing function with smoothing
        function drawFreehandLine(x0, y0, x1, y1, char) {
            // Use Bresenham's algorithm for smooth lines
            var dx = Math.abs(x1 - x0);
            var dy = Math.abs(y1 - y0);
            var sx = x0 < x1 ? 1 : -1;
            var sy = y0 < y1 ? 1 : -1;
            var err = dx - dy;
            
            while (true) {
                if (x0 >= 0 && x0 < COLS && y0 >= 0 && y0 < ROWS) {
                    grid[y0][x0] = char || currentChar;
                }
                if (x0 === x1 && y0 === y1) break;
                
                var e2 = 2 * err;
                if (e2 > -dy) { 
                    err -= dy; 
                    x0 += sx; 
                }
                if (e2 < dx) { 
                    err += dx; 
                    y0 += sy; 
                }
            }
        }
        
        // Enhanced freehand drawing with path smoothing
        function drawSmoothFreehand(points, char) {
            if (points.length < 2) return;
            
            // Draw lines between consecutive points
            for (var i = 1; i < points.length; i++) {
                var p0 = points[i - 1];
                var p1 = points[i];
                drawFreehandLine(p0.col, p0.row, p1.col, p1.row, char);
            }
        }
        
        // Performance optimized rendering
        function optimizedRender() {
            var now = Date.now();
            // Limit rendering to 60fps for better performance
            if (now - lastRenderTime < 16) {
                return;
            }
            lastRenderTime = now;
            render();
        }
        
        function drawLine(x0, y0, x1, y1, char) {
            // Don't save undo here - it's handled at the start of freehand drawing
            
            var dx = Math.abs(x1 - x0);
            var dy = Math.abs(y1 - y0);
            var sx = x0 < x1 ? 1 : -1;
            var sy = y0 < y1 ? 1 : -1;
            var err = dx - dy;
            
            while (true) {
                if (x0 >= 0 && x0 < COLS && y0 >= 0 && y0 < ROWS) {
                    grid[y0][x0] = char || currentChar;
                }
                if (x0 === x1 && y0 === y1) break;
                
                var e2 = 2 * err;
                if (e2 > -dy) { 
                    err -= dy; 
                    x0 += sx; 
                }
                if (e2 < dx) { 
                    err += dx; 
                    y0 += sy; 
                }
            }
            render();
        }
        
        function drawRectangle(x0, y0, x1, y1, char, filled) {
            saveUndo();
            
            var minX = Math.min(x0, x1);
            var maxX = Math.max(x0, x1);
            var minY = Math.min(y0, y1);
            var maxY = Math.max(y0, y1);
            
            for (var y = minY; y <= maxY; y++) {
                for (var x = minX; x <= maxX; x++) {
                    if (filled || y === minY || y === maxY || x === minX || x === maxX) {
                        if (y >= 0 && y < ROWS && x >= 0 && x < COLS) {
                            grid[y][x] = char || currentChar;
                        }
                    }
                }
            }
            render();
        }
        
        function startTextInput(row, col) {
            var input = document.createElement('input');
            input.type = 'text';
            input.style.position = 'absolute';
            input.style.left = canvas.offsetLeft + col * charWidth + 2 + 'px';
            input.style.top = canvas.offsetTop + row * charHeight - 2 + 'px';
            input.style.font = '14px JetBrains Mono';
            input.style.background = 'rgba(0, 212, 170, 0.25)';
            input.style.color = '#fff';
            input.style.border = '1px solid #00d4aa';
            input.style.padding = '1px 4px';
            input.style.width = '200px';
            input.style.height = charHeight + 2 + 'px';
            input.style.lineHeight = charHeight + 'px';
            input.style.zIndex = '1000';

            document.body.appendChild(input);
            input.focus();
            input.select();

            var committed = false;

            var commit = function() {
                if (committed) return;
                committed = true;
                var text = input.value.trim();
                if (text) {
                    saveUndo();
                    for (var i = 0; i < text.length; i++) {
                        var c = col + i;
                        if (c < COLS && row < ROWS) {
                            grid[row][c] = text[i];
                        }
                    }
                    render();
                }
                document.body.removeChild(input);
            };

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    commit();
                } else if (e.key === 'Escape') {
                    commit();
                }
            });

            input.addEventListener('blur', commit);
        }
        
        function floodFill(startRow, startCol, targetChar, replacementChar) {
            if (startRow < 0 || startRow >= ROWS || startCol < 0 || startCol >= COLS) return;
            if (grid[startRow][startCol] !== targetChar) return;
            if (targetChar === replacementChar) return;
            
            var stack = [[startRow, startCol]];
            var visited = new Set();
            
            while (stack.length > 0) {
                var item = stack.pop();
                var row = item[0];
                var col = item[1];
                var key = row + ',' + col;
                
                if (visited.has(key)) continue;
                visited.add(key);
                
                if (row < 0 || row >= ROWS || col < 0 || col >= COLS) continue;
                if (grid[row][col] !== targetChar) continue;
                
                grid[row][col] = replacementChar;
                
                stack.push([row - 1, col]);
                stack.push([row + 1, col]);
                stack.push([row, col - 1]);
                stack.push([row, col + 1]);
            }
            render();
        }
        
        function getMousePos(e) {
            var rect = canvas.getBoundingClientRect();
            return {
                col: Math.floor((e.clientX - rect.left) / charWidth),
                row: Math.floor((e.clientY - rect.top) / charHeight)
            };
        }
        
        // TOOL FUNCTIONS
        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(function(btn) {
                btn.classList.remove('active');
            });
            var toolBtn = document.querySelector('[data-tool="' + tool + '"]');
            if (toolBtn) toolBtn.classList.add('active');
        }
        
        function clearCanvas() {
            saveUndo();
            grid = Array(ROWS).fill(null).map(function() { 
                return Array(COLS).fill(' '); 
            });
            render();
        }
        
        function fillCanvas() {
            saveUndo();
            for (var row = 0; row < ROWS; row++) {
                for (var col = 0; col < COLS; col++) {
                    grid[row][col] = currentChar;
                }
            }
            render();
        }
        
        function saveUndo() {
            var state = grid.map(function(row) { 
                return row.slice(); 
            });
            undoStack.push(state);
            if (undoStack.length > MAX_HISTORY) {
                undoStack.shift();
            }
            redoStack = [];
        }
        
        function undo() {
            if (undoStack.length > 0) {
                redoStack.push(grid.map(function(row) { 
                    return row.slice(); 
                }));
                grid = undoStack.pop();
                render();
            }
        }
        
        function redo() {
            if (redoStack.length > 0) {
                undoStack.push(grid.map(function(row) { 
                    return row.slice(); 
                }));
                grid = redoStack.pop();
                render();
            }
        }
        
        function applyTemplate(templateName) {
            var template = templates[templateName];
            if (!template) return;
            
            saveUndo();
            clearCanvas();
            
            var startRow = Math.floor((ROWS - template.length) / 2);
            var startCol = Math.floor((COLS - Math.max.apply(Math, template.map(function(line) { 
                return line.length; 
            }))) / 2);
            
            for (var r = 0; r < template.length && startRow + r < ROWS; r++) {
                for (var c = 0; c < template[r].length && startCol + c < COLS; c++) {
                    grid[startRow + r][startCol + c] = template[r][c];
                }
            }
            render();
        }

        // Social Media Export Functions
        function getCanvasText() {

        function formatForSocialMedia(platform, text) {
            var limits = {
                tiktok: 150,
                twitter: 280,
                instagram: 2200,
                facebook: 8000,
                reddit: 40000,
                discord: 2000
            };
            
            var limit = limits[platform] || 280;
            var hashtags = {
                tiktok: '#ASCII #ASCIIart #DigitalArt #TikTokArt #Creative',
                twitter: '#ASCIIart #DigitalArt #ASCII #TechArt',
                instagram: '#ASCIIart #DigitalArt #ASCII #TechArt #CreativeCoding',
                facebook: '#ASCIIart #DigitalArt #ASCII #TechArt #Creative',
                reddit: '#ASCIIart #DigitalArt #ASCII #TechArt #Creative',
                discord: '#ASCIIart #DigitalArt #ASCII #TechArt'
            };
            
            // Trim whitespace and newlines
            var cleanText = text.replace(/^\s+|\s+$/g, '').replace(/\n+/g, '\n');
            
            // Check if text exceeds limit
            if (cleanText.length > limit) {
                // Try to truncate at line break
                var lines = cleanText.split('\n');
                var result = '';
                for (var i = 0; i < lines.length; i++) {
                    if ((result + lines[i] + '\n').length <= limit) {
                        result += lines[i] + '\n';
                    } else {
                        break;
                    }
                }
                cleanText = result.replace(/\n+$/, '');
                
                // If still too long, truncate character by character
                if (cleanText.length > limit) {
                    cleanText = cleanText.substring(0, limit - 3) + '...';
                }
            }
            
            // Add hashtags if there's space
            var tagStr = hashtags[platform];
            if ((cleanText + '\n\n' + tagStr).length <= limit) {
                return cleanText + '\n\n' + tagStr;
            } else if ((cleanText + ' ' + tagStr).length <= limit) {
                return cleanText + ' ' + tagStr;
            } else {
                return cleanText;
            }
        }
        
        function copyToClipboard(text) {
            var textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                var successful = document.execCommand('copy');
                document.body.removeChild(textarea);
                return successful;
            } catch (err) {
                document.body.removeChild(textarea);
                return false;
            }
        }

            }
        }

        // Canvas mouse events
        canvas.addEventListener('mousedown', function(e) {
            isDrawing = true;
            startPos = getMousePos(e);
            lastPos = startPos;
            drawingPath = [startPos]; // Start new drawing path

            if (currentTool === 'freehand') {
                saveUndo(); // Save undo only once at start of drawing
                drawChar(startPos.row, startPos.col, currentChar);
            } else if (currentTool === 'text') {
                startTextInput(startPos.row, startPos.col);
                isDrawing = false;
            } else if (currentTool === 'fill') {
                var pos = getMousePos(e);
                saveUndo();
                floodFill(pos.row, pos.col, grid[pos.row][pos.col], currentChar);
                isDrawing = false;
            } else if (currentTool === 'select') {
                selection = {
                    startRow: startPos.row,
                    startCol: startPos.col,
                    endRow: startPos.row,
                    endCol: startPos.col
                };
            }
        });
        
        canvas.addEventListener('mousemove', function(e) {
            var pos = getMousePos(e);
            lastPos = pos;

            if (!isDrawing) return;

            if (currentTool === 'freehand') {
                // Enhanced freehand drawing with path tracking
                if (pos.row !== lastPos.row || pos.col !== lastPos.col) {
                    drawingPath.push(pos); // Add to drawing path
                    drawFreehandLine(lastPos.col, lastPos.row, pos.col, pos.row, currentChar);
                    lastPos = pos;
                    optimizedRender(); // Use optimized rendering
                }
            } else if (currentTool === 'select' && selection) {
                selection.endRow = pos.row;
                selection.endCol = pos.col;
                render();
            }
        });
        
        canvas.addEventListener('mouseup', function(e) {
            if (!isDrawing) return;
            isDrawing = false;

            var endPos = getMousePos(e);

            if (currentTool === 'freehand') {
                // Final render after drawing is complete
                render();
                drawingPath = []; // Clear drawing path
            } else if (currentTool === 'line') {
                saveUndo(); // Save undo for line tool
                drawLine(startPos.col, startPos.row, endPos.col, endPos.row);
            } else if (currentTool === 'rectangle') {
                saveUndo(); // Save undo for rectangle tool
                drawRectangle(startPos.col, startPos.row, endPos.col, endPos.row, currentChar, false);
            } else if (currentTool === 'select' && selection) {
                // Normalize selection
                var tempRow = selection.startRow;
                var tempCol = selection.startCol;
                selection.startRow = Math.min(selection.startRow, selection.endRow);
                selection.startCol = Math.min(selection.startCol, selection.endCol);
                selection.endRow = Math.max(tempRow, selection.endRow);
                selection.endCol = Math.max(tempCol, selection.endCol);
                render();
            }

            startPos = null;
            drawingPath = [];
        });
        
        canvas.addEventListener('mouseleave', function() {
            isDrawing = false;
            drawingPath = []; // Clear path when leaving canvas
        });

                        } else {
                            undo();
                        }
                        break;
                    case 's':
                        e.preventDefault();
                        exportASCII();
                        break;
                }
            }
        });
        
        // INITIALIZATION
        // Initialize character palette
        initCharPalette();
        
        // Set initial tool
        setTool('freehand');
        
        // Initial render
        render();
        
        // Focus canvas for keyboard input
        canvas.focus();
        
        console.log('ASCII Canvas Studio v11.0 - Simplified and Functional!');
    </script>
</body>
