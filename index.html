<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Canvas AI - Diagram Editor with AI Assistant</title>
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-surface: #1a1a1a;
            --bg-surface-2: #252525;
            --border: #333;
            --accent: #4f98a3;
            --accent-hover: #6bb3c0;
            --text-primary: #e0e0e0;
            --text-secondary: #999;
            --success: #4caf50;
            --error: #f44336;
            --warning: #ff9800;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            height: 40px;
        }

        .header h1 {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
        }

        .ai-toggle {
            background: var(--bg-surface-2);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .ai-toggle:hover {
            background: var(--accent);
            color: white;
        }

        .ai-toggle.active {
            background: var(--accent);
            color: white;
        }

        /* Main Layout */
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Left Panel - Tools */
        .left-panel {
            width: 200px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border);
            padding: 16px;
            overflow-y: auto;
        }

        .tool-section {
            margin-bottom: 24px;
        }

        .tool-section h3 {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
        }

        .tool-btn {
            background: var(--bg-surface-2);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }

        .tool-btn:hover {
            background: var(--accent);
            color: white;
        }

        .tool-btn.active {
            background: var(--accent);
            color: white;
        }

        .style-select {
            width: 100%;
            background: var(--bg-surface-2);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 4px;
            border-radius: 4px;
            font-size: 11px;
            margin-bottom: 4px;
        }

        /* Canvas Area */
        .canvas-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            position: relative;
        }

        .canvas-wrapper {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        #canvas {
            position: absolute;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 12px;
            white-space: pre;
            cursor: crosshair;
            transform-origin: top left;
            image-rendering: pixelated;
        }

        /* Status Bar */
        .status-bar {
            background: var(--bg-surface);
            border-top: 1px solid var(--border);
            padding: 4px 16px;
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            gap: 16px;
        }

        /* AI Panel */
        .ai-panel {
            width: 280px;
            background: var(--bg-surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease-out;
            min-width: 200px;
            max-width: 500px;
        }

        .ai-panel.collapsed {
            transform: translateX(100%);
        }

        .ai-panel-header {
            background: var(--bg-surface-2);
            padding: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .ai-panel-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
        }

        .ai-panel-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 16px;
        }

        .ai-panel-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* API Config */
        .api-config {
            background: var(--bg-surface-2);
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .config-row {
            margin-bottom: 8px;
        }

        .config-row label {
            display: block;
            font-size: 10px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .config-input {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
        }

        .config-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .config-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            margin-top: 4px;
        }

        /* Quick Prompts */
        .quick-prompts {
            padding: 8px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 4px;
            overflow-x: auto;
        }

        .quick-prompt {
            background: var(--bg-surface-2);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 4px 8px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 10px;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .quick-prompt:hover {
            background: var(--accent);
            color: white;
        }

        /* Chat Messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .message {
            margin-bottom: 12px;
        }

        .message.user {
            text-align: right;
        }

        .message-bubble {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 8px;
            max-width: 100%;
            font-size: 11px;
            line-height: 1.4;
        }

        .message.user .message-bubble {
            background: var(--accent);
            color: white;
        }

        .message.ai .message-bubble {
            background: var(--bg-surface-2);
            color: var(--text-primary);
        }

        .ascii-code-block {
            background: var(--bg-primary);
            border-left: 3px solid var(--accent);
            padding: 8px;
            margin: 8px 0;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            line-height: 1.2;
            white-space: pre;
            overflow-x: auto;
        }

        .message-actions {
            margin-top: 8px;
            display: flex;
            gap: 4px;
        }

        .action-btn {
            background: var(--bg-surface-2);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 2px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 9px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--accent);
            color: white;
        }

        /* Chat Input */
        .chat-input-container {
            padding: 12px;
            border-top: 1px solid var(--border);
        }

        .chat-input-wrapper {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            background: var(--bg-surface-2);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 11px;
            resize: none;
            min-height: 32px;
            max-height: 80px;
            font-family: 'JetBrains Mono', monospace;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .send-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }

        .send-btn:hover {
            background: var(--accent-hover);
        }

        .send-btn:disabled {
            background: var(--border);
            cursor: not-allowed;
        }

        /* Loading */
        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error */
        .error-bubble {
            background: var(--error);
            color: white;
            padding: 8px;
            border-radius: 4px;
            font-size: 10px;
            margin: 8px 0;
        }

        /* Resize Handle */
        .resize-handle {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            cursor: ew-resize;
            background: transparent;
        }

        .resize-handle:hover {
            background: var(--accent);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-surface-2);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 11px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .toast.show {
            opacity: 1;
        }

        .toast.success {
            border-color: var(--success);
            color: var(--success);
        }

        .toast.error {
            border-color: var(--error);
            color: var(--error);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>ASCII Canvas Studio</h1>
        <div class="header-info">
            <span id="canvasInfo">200×80</span>
            <span id="toolInfo">Freehand</span>
        </div>
    </div>

    <div class="main-container">
        <div class="left-panel">
            <div class="tool-section">
                <h3>Tools</h3>
                <div class="tool-grid">
                    <button class="tool-btn active" data-tool="freehand">✏️ Freehand</button>
                    <button class="tool-btn" data-tool="line">📏 Line</button>
                    <button class="tool-btn" data-tool="rectangle">▢ Rectangle</button>
                    <button class="tool-btn" data-tool="diamond">◆ Diamond</button>
                    <button class="tool-btn" data-tool="circle">○ Circle</button>
                    <button class="tool-btn" data-tool="arrow">➜ Arrow</button>
                    <button class="tool-btn" data-tool="text">📝 Text</button>
                    <button class="tool-btn" data-tool="fill">🪣 Fill</button>
                    <button class="tool-btn" data-tool="spray">💨 Spray</button>
                    <button class="tool-btn" data-tool="eraser">🧹 Eraser</button>
                    <button class="tool-btn" data-tool="select">⬚ Select</button>
                    <button class="tool-btn" data-tool="move">✋ Move</button>
                </div>
            </div>

            <div class="tool-section">
                <h3>Border Style</h3>
                <select class="style-select" id="borderStyle">
                    <option value="simple">Simple</option>
                    <option value="double">Double</option>
                    <option value="rounded">Rounded</option>
                    <option value="heavy">Heavy</option>
                    <option value="light">Light</option>
                </select>
            </div>

            <div class="tool-section">
                <h3>Arrow Head</h3>
                <select class="style-select" id="arrowHead">
                    <option value="arrow">Arrow (>)</option>
                    <option value="triangle">Triangle (▶)</option>
                </select>
            </div>

            <div class="tool-section">
                <h3>Line Style</h3>
                <select class="style-select" id="lineStyle">
                    <option value="ascii">ASCII (-, |)</option>
                    <option value="light">Light (─, │)</option>
                    <option value="heavy">Heavy (━, ┃)</option>
                    <option value="dashed">Dashed</option>
                    <option value="dotted">Dotted</option>
                </select>
            </div>

            <div class="tool-section">
                <h3>Diamond Style</h3>
                <select class="style-select" id="diamondStyle">
                    <option value="simple">Simple (/, \)</option>
                    <option value="unicode">Unicode (◇)</option>
                </select>
            </div>

            <div class="tool-section">
                <h3>Freehand Char</h3>
                <select class="style-select" id="freehandChar">
                    <option value="*">*</option>
                    <option value="#">#</option>
                    <option value="+">+</option>
                    <option value=".">.</option>
                    <option value="x">x</option>
                    <option value="o">o</option>
                    <option value="~">~</option>
                </select>
            </div>

            <div class="tool-section">
                <h3>Eraser Size</h3>
                <select class="style-select" id="eraserSize">
                    <option value="1">1×1</option>
                    <option value="3">3×3</option>
                    <option value="5">5×5</option>
                </select>
            </div>
        </div>

        <div class="canvas-container">
            <div class="canvas-wrapper">
                <canvas id="canvas"></canvas>
            </div>
            <div class="status-bar">
                <span id="cursorPos">0, 0</span>
                <span id="canvasSize">200×80</span>
                <span id="zoomLevel">100%</span>
                <span id="currentTool">Freehand</span>
                <span id="hint">Ready to draw</span>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Canvas Setup
        const COLS = 200;
        const ROWS = 80;
        let grid = Array(ROWS).fill().map(() => Array(COLS).fill(' '));
        let currentTool = 'freehand';
        let isDrawing = false;
        let startPos = null;
        let currentPos = null;
        let moveStartPos = null;
        let zoom = 1;
        let panX = 0;
        let panY = 0;
        let isPanning = false;
        let lastPanPos = null;
        let selection = null;
        let undoStack = [];
        let redoStack = [];

        // Canvas Element
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // UI Elements
        const cursorPos = document.getElementById('cursorPos');
        const canvasSize = document.getElementById('canvasSize');
        const zoomLevel = document.getElementById('zoomLevel');
        const currentToolSpan = document.getElementById('currentTool');
        const hint = document.getElementById('hint');

        // AI Panel Elements
        const aiToggle = document.getElementById('aiToggle');
        const aiPanel = document.getElementById('aiPanel');
        const aiPanelClose = document.getElementById('aiPanelClose');
        const resizeHandle = document.getElementById('resizeHandle');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

        // Initialize Canvas
        function initCanvas() {
            canvas.width = COLS * 8;
            canvas.height = ROWS * 12;
            render();
        }

        // Render Grid
        function render() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * 8, 0);
                ctx.lineTo(i * 8, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * 12);
                ctx.lineTo(canvas.width, i * 12);
                ctx.stroke();
            }
            
            // Draw text
            ctx.fillStyle = '#e0e0e0';
            ctx.font = '12px JetBrains Mono, monospace';
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const char = grid[row][col];
                    if (char !== ' ') {
                        ctx.fillText(char, col * 8, row * 12 + 10);
                    }
                }
            }
            
            // Draw selection
            if (selection) {
                ctx.strokeStyle = '#4f98a3';
                ctx.lineWidth = 2;
                ctx.strokeRect(
                    selection.startCol * 8,
                    selection.startRow * 12,
                    (selection.endCol - selection.startCol + 1) * 8,
                    (selection.endRow - selection.startRow + 1) * 12
                );
            }
        }

        // Get mouse position in grid coordinates
        function getGridPos(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / zoom - panX;
            const y = (e.clientY - rect.top) / zoom - panY;
            return {
                col: Math.floor(x / 8),
                row: Math.floor(y / 12)
            };
        }

        // Save state for undo
        function saveUndo() {
            undoStack.push(grid.map(row => [...row]));
            if (undoStack.length > 50) undoStack.shift();
            redoStack = [];
        }

        // Tool functions
        function drawRectangle(start, end, style) {
            const chars = getBorderChars(style);
            
            // Ensure proper coordinates
            const minCol = Math.min(start.col, end.col);
            const maxCol = Math.max(start.col, end.col);
            const minRow = Math.min(start.row, end.row);
            const maxRow = Math.max(start.row, end.row);
            
            // Don't draw if rectangle is too small
            if (maxCol - minCol < 1 || maxRow - minRow < 1) return;
            
            // Draw horizontal lines
            for (let col = minCol; col <= maxCol; col++) {
                if (minRow >= 0 && minRow < ROWS && col >= 0 && col < COLS) {
                    grid[minRow][col] = chars.h;
                }
                if (maxRow >= 0 && maxRow < ROWS && col >= 0 && col < COLS) {
                    grid[maxRow][col] = chars.h;
                }
            }
            
            // Draw vertical lines
            for (let row = minRow + 1; row < maxRow; row++) {
                if (row >= 0 && row < ROWS && minCol >= 0 && minCol < COLS) {
                    grid[row][minCol] = chars.v;
                }
                if (row >= 0 && row < ROWS && maxCol >= 0 && maxCol < COLS) {
                    grid[row][maxCol] = chars.v;
                }
            }
            
            // Draw corners
            if (minRow >= 0 && minRow < ROWS && minCol >= 0 && minCol < COLS) {
                grid[minRow][minCol] = chars.tl;
            }
            if (minRow >= 0 && minRow < ROWS && maxCol >= 0 && maxCol < COLS) {
                grid[minRow][maxCol] = chars.tr;
            }
            if (maxRow >= 0 && maxRow < ROWS && minCol >= 0 && minCol < COLS) {
                grid[maxRow][minCol] = chars.bl;
            }
            if (maxRow >= 0 && maxRow < ROWS && maxCol >= 0 && maxCol < COLS) {
                grid[maxRow][maxCol] = chars.br;
            }
        }

        function drawDiamond(start, end, style) {
            // Ensure proper coordinates
            const minCol = Math.min(start.col, end.col);
            const maxCol = Math.max(start.col, end.col);
            const minRow = Math.min(start.row, end.row);
            const maxRow = Math.max(start.row, end.row);
            
            const midRow = Math.floor((minRow + maxRow) / 2);
            const midCol = Math.floor((minCol + maxCol) / 2);
            
            if (style === 'unicode') {
                // Fill diamond with unicode diamonds
                for (let row = minRow; row <= maxRow; row++) {
                    for (let col = minCol; col <= maxCol; col++) {
                        const relRow = Math.abs(row - midRow);
                        const relCol = Math.abs(col - midCol);
                        const maxDist = Math.max(Math.abs(maxRow - midRow), Math.abs(maxCol - midCol));
                        
                        if (relRow + relCol <= maxDist) {
                            if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
                                grid[row][col] = '◇';
                            }
                        }
                    }
                }
            } else {
                // Draw diamond outline with / and \
                // Top half
                for (let row = minRow; row <= midRow; row++) {
                    const progress = (row - minRow) / (midRow - minRow);
                    const leftCol = Math.floor(minCol + (midCol - minCol) * progress);
                    const rightCol = Math.floor(midCol + (maxCol - midCol) * progress);
                    
                    if (row >= 0 && row < ROWS && leftCol >= 0 && leftCol < COLS) {
                        grid[row][leftCol] = row === minRow ? '/' : '\\';
                    }
                    if (row >= 0 && row < ROWS && rightCol >= 0 && rightCol < COLS) {
                        grid[row][rightCol] = row === minRow ? '\\' : '/';
                    }
                }
                
                // Bottom half
                for (let row = midRow + 1; row <= maxRow; row++) {
                    const progress = (row - midRow) / (maxRow - midRow);
                    const leftCol = Math.floor(midCol - (midCol - minCol) * progress);
                    const rightCol = Math.floor(midCol + (maxCol - midCol) * progress);
                    
                    if (row >= 0 && row < ROWS && leftCol >= 0 && leftCol < COLS) {
                        grid[row][leftCol] = row === maxRow ? '\\' : '/';
                    }
                    if (row >= 0 && row < ROWS && rightCol >= 0 && rightCol < COLS) {
                        grid[row][rightCol] = row === maxRow ? '/' : '\\';
                    }
                }
            }
        }

        function drawLine(start, end, style) {
            const chars = getLineChars(style);
            const dx = Math.abs(end.col - start.col);
            const dy = Math.abs(end.row - start.row);
            const sx = start.col < end.col ? 1 : -1;
            const sy = start.row < end.row ? 1 : -1;
            let err = dx - dy;
            let x = start.col;
            let y = start.row;

            while (true) {
                // Draw the current point
                if (y >= 0 && y < ROWS && x >= 0 && x < COLS) {
                    const isHorizontal = dx > dy;
                    grid[y][x] = isHorizontal ? chars.h : chars.v;
                }
                
                // Check if we've reached the end
                if (x === end.col && y === end.row) break;
                
                // Bresenham's line algorithm
                const e2 = 2 * err;
                if (e2 > -dy) {
                    err -= dy;
                    x += sx;
                }
                if (e2 < dx) {
                    err += dx;
                    y += sy;
                }
            }
        }

        function drawArrow(start, end, style, head) {
            drawLine(start, end, style);
            
            // Calculate arrow head
            const dx = end.col - start.col;
            const dy = end.row - start.row;
            const len = Math.sqrt(dx * dx + dy * dy);
            
            if (len === 0) return; // Prevent division by zero
            
            const ux = dx / len;
            const uy = dy / len;
            
            if (head === 'arrow') {
                // Simple arrow head >
                if (end.row >= 0 && end.row < ROWS && end.col >= 0 && end.col < COLS) {
                    grid[end.row][end.col] = '>';
                }
            } else {
                // Triangle arrow head ▶
                const headSize = 2;
                const perpX = -uy;
                const perpY = ux;
                
                // Calculate triangle points
                const tipRow = Math.round(end.row - uy * headSize);
                const tipCol = Math.round(end.col - ux * headSize);
                const base1Row = Math.round(tipRow + perpY * headSize);
                const base1Col = Math.round(tipCol + perpX * headSize);
                const base2Row = Math.round(tipRow - perpY * headSize);
                const base2Col = Math.round(tipCol - perpX * headSize);
                
                // Draw triangle points
                const points = [
                    {row: tipRow, col: tipCol},
                    {row: base1Row, col: base1Col},
                    {row: base2Row, col: base2Col}
                ];
                
                points.forEach(point => {
                    if (point.row >= 0 && point.row < ROWS && point.col >= 0 && point.col < COLS) {
                        grid[point.row][point.col] = '▶';
                    }
                });
            }
        }

        function drawFreehand(pos, char) {
            if (pos.row >= 0 && pos.row < ROWS && pos.col >= 0 && pos.col < COLS) {
                grid[pos.row][pos.col] = char;
            }
        }

        function erase(pos, size) {
            const half = Math.floor(size / 2);
            for (let row = pos.row - half; row <= pos.row + half; row++) {
                for (let col = pos.col - half; col <= pos.col + half; col++) {
                    if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
                        grid[row][col] = ' ';
                    }
                }
            }
        }

        function floodSelect(start) {
            // Get the character at the start position
            if (start.row < 0 || start.row >= ROWS || start.col < 0 || start.col >= COLS) {
                return null;
            }
            
            const char = grid[start.row][start.col];
            if (char === ' ') return null; // Don't select empty spaces
            
            const visited = new Set();
            const queue = [start];
            const cells = [];
            
            while (queue.length > 0) {
                const pos = queue.shift();
                const key = `${pos.row},${pos.col}`;
                
                if (visited.has(key)) continue;
                visited.add(key);
                
                // Check bounds
                if (pos.row < 0 || pos.row >= ROWS || pos.col < 0 || pos.col >= COLS) continue;
                
                // Check if character matches
                if (grid[pos.row][pos.col] !== char) continue;
                
                cells.push(pos);
                
                // Add adjacent cells
                queue.push({row: pos.row - 1, col: pos.col});
                queue.push({row: pos.row + 1, col: pos.col});
                queue.push({row: pos.row, col: pos.col - 1});
                queue.push({row: pos.row, col: pos.col + 1});
            }
            
            if (cells.length === 0) return null;
            
            // Calculate bounding box
            const minRow = Math.min(...cells.map(c => c.row));
            const maxRow = Math.max(...cells.map(c => c.row));
            const minCol = Math.min(...cells.map(c => c.col));
            const maxCol = Math.max(...cells.map(c => c.col));
            
            return {
                startRow: minRow,
                endRow: maxRow,
                startCol: minCol,
                endCol: maxCol,
                cells: cells,
                char: char
            };
        }

        // Helper functions
        function getBorderChars(style) {
            const styles = {
                simple: {h: '-', v: '|', tl: '+', tr: '+', bl: '+', br: '+'},
                double: {h: '=', v: '||', tl: '+', tr: '+', bl: '+', br: '+'},
                rounded: {h: '-', v: '|', tl: '/', tr: '\\', bl: '\\', br: '/'},
                heavy: {h: '━', v: '┃', tl: '┏', tr: '┓', bl: '┗', br: '┛'},
                light: {h: '─', v: '│', tl: '┌', tr: '┐', bl: '└', br: '┘'}
            };
            return styles[style] || styles.simple;
        }

        function getLineChars(style) {
            const styles = {
                ascii: {h: '-', v: '|'},
                light: {h: '─', v: '│'},
                heavy: {h: '━', v: '┃'},
                dashed: {h: '- -', v: '| |'},
                dotted: {h: '. .', v: '. .'}
            };
            return styles[style] || styles.ascii;
        }

        // Event handlers
        canvas.addEventListener('mousedown', (e) => {
            const pos = getGridPos(e);
            
            if (e.button === 1 || (e.button === 0 && e.spaceKey)) {
                isPanning = true;
                lastPanPos = {x: e.clientX, y: e.clientY};
                canvas.style.cursor = 'grabbing';
                return;
            }
            
            isDrawing = true;
            startPos = pos;
            currentPos = pos;
            
            if (currentTool === 'select') {
                const selected = floodSelect(pos);
                if (selected) {
                    selection = selected;
                    render();
                }
            } else if (currentTool === 'text') {
                const text = prompt('Enter text:');
                if (text && text.trim()) {
                    saveUndo();
                    const cleanText = text.trim();
                    let currentCol = pos.col;
                    let currentRow = pos.row;
                    
                    // Handle multi-line text
                    const lines = cleanText.split('\n');
                    
                    for (let lineIndex = 0; lineIndex < lines.length; lineIndex++) {
                        const line = lines[lineIndex];
                        
                        // Check if we're within canvas bounds
                        if (currentRow >= 0 && currentRow < ROWS) {
                            // Draw each character of the line
                            for (let i = 0; i < line.length && currentCol + i < COLS; i++) {
                                if (currentCol + i >= 0) {
                                    grid[currentRow][currentCol + i] = line[i];
                                }
                            }
                        }
                        
                        // Move to next line for multi-line text
                        currentRow++;
                        currentCol = pos.col; // Reset column for new line
                    }
                    
                    render();
                }
            } else if (currentTool === 'freehand' || currentTool === 'eraser') {
                saveUndo();
                if (currentTool === 'freehand') {
                    const char = document.getElementById('freehandChar').value;
                    drawFreehand(pos, char);
                } else {
                    const size = parseInt(document.getElementById('eraserSize').value);
                    erase(pos, size);
                }
                render();
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const pos = getGridPos(e);
            cursorPos.textContent = `${pos.col}, ${pos.row}`;
            
            if (isPanning && lastPanPos) {
                panX += e.clientX - lastPanPos.x;
                panY += e.clientY - lastPanPos.y;
                lastPanPos = {x: e.clientX, y: e.clientY};
                canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
                return;
            }
            
            if (!isDrawing) return;
            
            currentPos = pos;
            
            if (currentTool === 'freehand') {
                const char = document.getElementById('freehandChar').value;
                drawFreehand(pos, char);
                render();
            } else if (currentTool === 'spray') {
                const char = document.getElementById('freehandChar').value;
                sprayArea(pos, char);
                render();
            } else if (currentTool === 'eraser') {
                const size = parseInt(document.getElementById('eraserSize').value);
                erase(pos, size);
                render();
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            if (isPanning) {
                isPanning = false;
                lastPanPos = null;
                canvas.style.cursor = 'crosshair';
                return;
            }
            
            if (!isDrawing || !startPos || !currentPos) return;
            
            saveUndo();
            
            const borderStyle = document.getElementById('borderStyle').value;
            const lineStyle = document.getElementById('lineStyle').value;
            const arrowHead = document.getElementById('arrowHead').value;
            const diamondStyle = document.getElementById('diamondStyle').value;
            
            if (currentTool === 'rectangle') {
                drawRectangle(startPos, currentPos, borderStyle);
            } else if (currentTool === 'diamond') {
                drawDiamond(startPos, currentPos, diamondStyle);
            } else if (currentTool === 'circle') {
                const radius = Math.sqrt(
                    Math.pow(currentPos.col - startPos.col, 2) + 
                    Math.pow(currentPos.row - startPos.row, 2)
                );
                drawCircle(startPos, Math.round(radius), borderStyle);
            } else if (currentTool === 'line') {
                drawLine(startPos, currentPos, lineStyle);
            } else if (currentTool === 'arrow') {
                drawArrow(startPos, currentPos, lineStyle, arrowHead);
            } else if (currentTool === 'move') {
                moveSelection(moveStartPos, currentPos);
            }
            
            isDrawing = false;
            startPos = null;
            currentPos = null;
            moveStartPos = null;
            render();
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            zoom = Math.max(0.5, Math.min(3, zoom * delta));
            canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
            zoomLevel.textContent = `${Math.round(zoom * 100)}%`;
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
            
            e.spaceKey = e.code === 'Space';
            
            if (e.ctrlKey && e.key === 'z') {
                e.preventDefault();
                if (undoStack.length > 0) {
                    redoStack.push(grid.map(row => [...row]));
                    grid = undoStack.pop();
                    render();
                }
            } else if (e.ctrlKey && e.key === 'y') {
                e.preventDefault();
                if (redoStack.length > 0) {
                    undoStack.push(grid.map(row => [...row]));
                    grid = redoStack.pop();
                    render();
                }
            } else if (e.ctrlKey && e.shiftKey && e.key === 'C') {
                e.preventDefault();
                const ascii = grid.map(row => row.join('')).join('\n');
                navigator.clipboard.writeText(ascii);
                showToast('Copied to clipboard', 'success');
            } else if (e.key === 'Delete') {
                saveUndo();
                grid = Array(ROWS).fill().map(() => Array(COLS).fill(' '));
                render();
            } else if (e.key === 'v') {
                setTool('select');
            } else if (e.key === 'r') {
                setTool('rectangle');
            } else if (e.key === 'd') {
                setTool('diamond');
            } else if (e.key === 'l') {
                setTool('line');
            } else if (e.key === 'a') {
                setTool('arrow');
            } else if (e.key === 't') {
                setTool('text');
            } else if (e.key === 'f') {
                setTool('freehand');
            } else if (e.key === 'e') {
                setTool('eraser');
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                e.spaceKey = false;
            }
        });

        // Tool selection
        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tool === tool);
            });
            currentToolSpan.textContent = tool.charAt(0).toUpperCase() + tool.slice(1);
            
            if (tool === 'text') {
                canvas.style.cursor = 'text';
            } else if (tool === 'eraser') {
                canvas.style.cursor = 'crosshair';
            } else {
                canvas.style.cursor = 'crosshair';
            }
        }

        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.addEventListener('click', () => setTool(btn.dataset.tool));
        });

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // New creative tools functionality
        
        // Circle drawing tool
        function drawCircle(center, radius, style) {
            const chars = getBorderChars(style);
            
            for (let angle = 0; angle < 360; angle += 5) {
                const radians = (angle * Math.PI) / 180;
                const x = Math.round(center.col + radius * Math.cos(radians));
                const y = Math.round(center.row + radius * Math.sin(radians));
                
                if (y >= 0 && y < ROWS && x >= 0 && x < COLS) {
                    grid[y][x] = chars.h;
                }
            }
        }
        
        // Fill tool
        function fillArea(start, char) {
            if (start.row < 0 || start.row >= ROWS || start.col < 0 || start.col >= COLS) return;
            
            const targetChar = grid[start.row][start.col];
            if (targetChar === char) return; // Already filled with this character
            
            const visited = new Set();
            const queue = [start];
            
            while (queue.length > 0) {
                const pos = queue.shift();
                const key = `${pos.row},${pos.col}`;
                
                if (visited.has(key)) continue;
                visited.add(key);
                
                if (pos.row < 0 || pos.row >= ROWS || pos.col < 0 || pos.col >= COLS) continue;
                if (grid[pos.row][pos.col] !== targetChar) continue;
                
                grid[pos.row][pos.col] = char;
                
                queue.push({row: pos.row - 1, col: pos.col});
                queue.push({row: pos.row + 1, col: pos.col});
                queue.push({row: pos.row, col: pos.col - 1});
                queue.push({row: pos.row, col: pos.col + 1});
            }
        }
        
        // Spray tool
        function sprayArea(center, char, density = 0.3) {
            const radius = 3;
            
            for (let dy = -radius; dy <= radius; dy++) {
                for (let dx = -radius; dx <= radius; dx++) {
                    if (Math.random() > density) continue;
                    
                    const x = center.col + dx;
                    const y = center.row + dy;
                    
                    if (y >= 0 && y < ROWS && x >= 0 && x < COLS) {
                        grid[y][x] = char;
                    }
                }
            }
        }
        
        // Move tool
        function moveSelection(from, to) {
            if (!selection) return;
            
            saveUndo();
            const dx = to.col - from.col;
            const dy = to.row - from.row;
            
            // Clear original position
            selection.cells.forEach(cell => {
                grid[cell.row][cell.col] = ' ';
            });
            
            // Draw at new position
            selection.cells.forEach(cell => {
                const newRow = cell.row + dy;
                const newCol = cell.col + dx;
                if (newRow >= 0 && newRow < ROWS && newCol >= 0 && newCol < COLS) {
                    grid[newRow][newCol] = selection.char || '*';
                }
            });
            
            selection = null;
            render();
        }

        // Add message to chat
        function addMessage(type, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            if (type === 'error') {
                messageDiv.innerHTML = `<div class="error-bubble">${content}</div>`;
            } else {
                let processedContent = content;
                
                // Extract ASCII code blocks
                const asciiBlocks = [];
                const regex = /```(?:ascii|art)?\n([\s\S]*?)```/gi;
                let match;
                while ((match = regex.exec(content)) !== null) {
                    asciiBlocks.push(match[1]);
                    processedContent = processedContent.replace(match[0], `<div class="ascii-code-block">${match[1]}</div>`);
                }
                
                messageDiv.innerHTML = `<div class="message-bubble">${processedContent}</div>`;
                
                // Add action buttons if ASCII blocks found
                if (asciiBlocks.length > 0 && type === 'ai') {
                    const actionsDiv = document.createElement('div');
                    actionsDiv.className = 'message-actions';
                    
                    const applyBtn = document.createElement('button');
                    applyBtn.className = 'action-btn';
                    applyBtn.textContent = 'Apply to Canvas';
                    applyBtn.onclick = () => applyAsciiToCanvas(asciiBlocks[asciiBlocks.length - 1], 0, 0);
                    
                    const atCursorBtn = document.createElement('button');
                    atCursorBtn.className = 'action-btn';
                    atCursorBtn.textContent = 'Apply at Cursor';
                    atCursorBtn.onclick = () => {
                        const pos = getGridPos({clientX: canvas.width / 2, clientY: canvas.height / 2});
                        applyAsciiToCanvas(asciiBlocks[asciiBlocks.length - 1], pos.col, pos.row);
                    };
                    
                    const appendBtn = document.createElement('button');
                    appendBtn.className = 'action-btn';
                    appendBtn.textContent = 'Append';
                    appendBtn.onclick = () => {
                        let firstEmptyRow = 0;
                        for (let row = 0; row < ROWS; row++) {
                            if (grid[row].every(char => char === ' ')) {
                                firstEmptyRow = row;
                                break;
                            }
                        }
                        applyAsciiToCanvas(asciiBlocks[asciiBlocks.length - 1], 0, firstEmptyRow);
                    };
                    
                    actionsDiv.appendChild(applyBtn);
                    actionsDiv.appendChild(atCursorBtn);
                    actionsDiv.appendChild(appendBtn);
                    messageDiv.appendChild(actionsDiv);
                }
            }
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Apply ASCII to canvas
        function applyAsciiToCanvas(asciiText, startCol = 0, startRow = 0) {
            saveUndo();
            const lines = asciiText.split('\n');
            for (let r = 0; r < lines.length && startRow + r < ROWS; r++) {
                for (let c = 0; c < lines[r].length && startCol + c < COLS; c++) {
                    grid[startRow + r][startCol + c] = lines[r][c];
                }
            }
            render();
            showToast('Applied to canvas', 'success');
        }

        // Update event handlers for new tools
        canvas.addEventListener('mousedown', (e) => {
            const pos = getGridPos(e);
            
            if (e.button === 1 || (e.button === 0 && e.spaceKey)) {
                isPanning = true;
                lastPanPos = {x: e.clientX, y: e.clientY};
                canvas.style.cursor = 'grabbing';
                return;
            }
            
            isDrawing = true;
            startPos = pos;
            currentPos = pos;
            
            if (currentTool === 'select') {
                const selected = floodSelect(pos);
                if (selected) {
                    selection = selected;
                    render();
                }
            } else if (currentTool === 'move') {
                if (selection) {
                    moveStartPos = pos;
                }
            } else if (currentTool === 'text') {
                const text = prompt('Enter text:');
                if (text && text.trim()) {
                    saveUndo();
                    const cleanText = text.trim();
                    let currentCol = pos.col;
                    let currentRow = pos.row;
                    
                    const lines = cleanText.split('\n');
                    
                    for (let lineIndex = 0; lineIndex < lines.length; lineIndex++) {
                        const line = lines[lineIndex];
                        
                        if (currentRow >= 0 && currentRow < ROWS) {
                            for (let i = 0; i < line.length && currentCol + i < COLS; i++) {
                                if (currentCol + i >= 0) {
                                    grid[currentRow][currentCol + i] = line[i];
                                }
                            }
                        }
                        
                        currentRow++;
                        currentCol = pos.col;
                    }
                    
                    render();
                }
            } else if (currentTool === 'fill') {
                saveUndo();
                const fillChar = prompt('Enter fill character:', '*');
                if (fillChar) {
                    fillArea(pos, fillChar);
                    render();
                }
            } else if (currentTool === 'freehand' || currentTool === 'spray' || currentTool === 'eraser') {
                saveUndo();
                if (currentTool === 'freehand') {
                    const char = document.getElementById('freehandChar').value;
                    drawFreehand(pos, char);
                } else if (currentTool === 'spray') {
                    const char = document.getElementById('freehandChar').value;
                    sprayArea(pos, char);
                } else {
                    const size = parseInt(document.getElementById('eraserSize').value);
                    erase(pos, size);
                }
                render();
            }
        });

        // Panel resize - removed
        
        // Initialize
        initCanvas();
        setTool('freehand');
        
        // Update header info
        document.getElementById('canvasInfo').textContent = `${COLS}×${ROWS}`;
        document.getElementById('toolInfo').textContent = 'Freehand';
    </script>
</body>
