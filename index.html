<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Canvas Studio - Professional ASCII Art Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* =============================================
           MODERN DESIGN SYSTEM
           ============================================= */
        
        :root {
            /* Color System */
            --bg-primary: #0f0f0f;
            --bg-surface: #1a1a1a;
            --bg-surface-2: #252525;
            --bg-surface-3: #2f2f2f;
            --border: #3a3a3a;
            --border-subtle: #2a2a2a;
            
            /* Brand Colors */
            --accent: #00d4aa;
            --accent-hover: #00f5c2;
            --accent-light: rgba(0, 212, 170, 0.1);
            --accent-gradient: linear-gradient(135deg, #00d4aa, #00a8cc);
            
            /* Semantic Colors */
            --success: #00c896;
            --warning: #ffb347;
            --error: #ff6b6b;
            --info: #4dabf7;
            
            /* Text Colors */
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-tertiary: #808080;
            --text-inverse: #0f0f0f;
            
            /* Shadows */
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.25);
            --shadow-glow: 0 0 20px rgba(0, 212, 170, 0.3);
            
            /* Spacing */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --space-2xl: 48px;
            
            /* Border Radius */
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            
            /* Typography */
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
            --font-size-xs: 11px;
            --font-size-sm: 12px;
            --font-size-base: 14px;
            --font-size-lg: 16px;
            --font-size-xl: 18px;
            
            /* Transitions */
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-normal: 250ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 350ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* =============================================
           BASE STYLES
           ============================================= */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-size: var(--font-size-base);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* =============================================
           LAYOUT COMPONENTS
           ============================================= */
        
        .app-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .left-panel {
            width: 320px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-subtle);
            padding: var(--space-md) var(--space-xl);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .logo {
            font-family: var(--font-mono);
            font-size: var(--font-size-lg);
            font-weight: 600;
            color: var(--accent);
            text-decoration: none;
        }

        .header-info {
            display: flex;
            gap: var(--space-sm);
            align-items: center;
        }

        .info-badge {
            background: var(--accent);
            color: var(--text-inverse);
            padding: var(--space-xs) var(--space-sm);
            border-radius: var(--radius-md);
            font-size: var(--font-size-xs);
            font-weight: 500;
        }

        .canvas-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            position: relative;
            overflow: hidden;
        }

        .canvas-wrapper {
            flex: 1;
            position: relative;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #canvas {
            font-family: var(--font-mono);
            font-size: 12px;
            line-height: 1;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            will-change: transform;
            transform-origin: 0 0;
            transition: transform var(--transition-fast);
        }

        .status-bar {
            background: var(--bg-surface);
            border-top: 1px solid var(--border-subtle);
            padding: var(--space-sm) var(--space-xl);
            display: flex;
            align-items: center;
            gap: var(--space-lg);
            font-family: var(--font-mono);
            font-size: var(--font-size-xs);
            color: var(--text-secondary);
        }

        /* =============================================
           TOOL PANEL COMPONENTS
           ============================================= */
        
        .tool-section {
            padding: var(--space-md);
            border-bottom: 1px solid var(--border-subtle);
        }

        .tool-section h3 {
            font-family: var(--font-sans);
            font-size: var(--font-size-sm);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--space-md);
            display: flex;
            align-items: center;
            gap: var(--space-xs);
        }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-sm);
        }

        .tool-btn {
            background: var(--bg-surface-2);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            padding: var(--space-sm);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-family: var(--font-sans);
            font-size: var(--font-size-xs);
            font-weight: 500;
            transition: var(--transition-fast);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-xs);
            min-height: 60px;
        }

        .tool-btn:hover {
            background: var(--bg-surface-3);
            border-color: var(--accent);
            color: var(--text-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .tool-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--text-inverse);
        }

        .tool-icon {
            font-size: var(--font-size-xl);
            line-height: 1;
        }

        .tool-label {
            font-size: var(--font-size-xs);
            text-align: center;
            line-height: 1.2;
        }

        /* =============================================
           MOBILE RESPONSIVE
           ============================================= */
        
        @media (max-width: 768px) {
            .left-panel {
                width: 280px;
            }
            
            .tool-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .left-panel {
                position: absolute;
                z-index: 200;
                transform: translateX(-100%);
                transition: transform var(--transition-normal);
            }
            
            .left-panel.mobile-open {
                transform: translateX(0);
            }
            
            .tool-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <script>
        // =============================================
           CANVAS SETUP
           =============================================
        
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        
        // Canvas dimensions
        var COLS = 200;
        var ROWS = 80;
        var charWidth = 8;
        var charHeight = 12;
        
        canvas.width = COLS * charWidth;
        canvas.height = ROWS * charHeight;
        
        // Grid data
        var grid = Array(ROWS).fill(null).map(function() { return Array(COLS).fill(' '); });
        
        // Current state
        var currentTool = 'freehand';
        var currentChar = '*';
        var isDrawing = false;
        var lastPos = null;
        var startPos = null;
        var selectedCharIndex = 0;
        var clipboard = null;
        var apiKey = localStorage.getItem('openai_api_key') || '';
        var aiStatus = 'idle';
        
        // History
        let undoStack = [];
        let redoStack = [];
        const MAX_HISTORY = 50;
        
        // Selection
        let selection = null;
        
        // =============================================
           RENDERING SYSTEM
           =============================================
        
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background
            ctx.fillStyle = '#0f0f0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.fillStyle = '#ffffff';
            ctx.font = '12px JetBrains Mono';
            
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const char = grid[row][col];
                    if (char !== ' ') {
                        ctx.fillText(char, col * charWidth, row * charHeight);
                    }
                }
            }
            
            // Draw selection
            if (selection) {
                ctx.strokeStyle = '#00d4aa';
                ctx.lineWidth = 2;
                ctx.strokeRect(
                    selection.startCol * charWidth,
                    selection.startRow * charHeight,
                    (selection.endCol - selection.startCol + 1) * charWidth,
                    (selection.endRow - selection.startRow + 1) * charHeight
                );
            }
            
            updateInfo();
        }
        
        // =============================================
           INFO UPDATES
           =============================================
        
        function updateInfo() {
            document.getElementById('cursorPos').textContent = lastPos ? lastPos.col + ', ' + lastPos.row : '0, 0';
            document.getElementById('currentTool').textContent = 
                currentTool.charAt(0).toUpperCase() + currentTool.substring(1) +
                (currentChar !== ' ' ? ' (' + currentChar + ')' : ' (space)');
            document.getElementById('zoomLevel').textContent = '100%';
            
            // Count characters and lines
            let charCount = 0;
            let lineCount = 0;
            
            for (let row = 0; row < ROWS; row++) {
                let hasContent = false;
                for (let col = 0; col < COLS; col++) {
                    if (grid[row][col] !== ' ') {
                        charCount++;
                        hasContent = true;
                    }
                }
                if (hasContent) {
                    lineCount++;
                }
            }
            
            document.getElementById('canvasSize').textContent = COLS + '×' + ROWS;
            document.getElementById('charCount').textContent = charCount;
            document.getElementById('lineCount').textContent = lineCount;
            
            // Selection info
            if (selection) {
                const width = selection.endCol - selection.startCol + 1;
                const height = selection.endRow - selection.startRow + 1;
                document.getElementById('selectionInfo').textContent = width + '×' + height;
            } else {
                document.getElementById('selectionInfo').textContent = 'None';
            }
        }
        
        // =============================================
           DRAWING FUNCTIONS
           =============================================
        
        function drawLine(x0, y0, x1, y1, char) {
            saveUndo();
            
            const dx = Math.abs(x1 - x0);
            const dy = Math.abs(y1 - y0);
            const sx = x0 < x1 ? 1 : -1;
            const sy = y0 < y1 ? 1 : -1;
            let err = dx - dy;
            
            while (true) {
                if (x0 >= 0 && x0 < COLS && y0 >= 0 && y0 < ROWS) {
                    grid[y0][x0] = char || currentChar;
                }
                if (x0 === x1 && y0 === y1) break;
                
                const e2 = 2 * err;
                if (e2 > -dy) { err -= dy; x0 += sx; }
                if (e2 <  dx) { err += dx; y0 += sy; }
            }
            render();
        }
        
        function drawRectangle(x0, y0, x1, y1, char, filled) {
            saveUndo();
            
            const minX = Math.min(x0, x1);
            const maxX = Math.max(x0, x1);
            const minY = Math.min(y0, y1);
            const maxY = Math.max(y0, y1);
            
            for (let y = minY; y <= maxY; y++) {
                for (let x = minX; x <= maxX; x++) {
                    if (filled || y === minY || y === maxY || x === minX || x === maxX) {
                        if (y >= 0 && y < ROWS && x >= 0 && x < COLS) {
                            grid[y][x] = char || currentChar;
                        }
                    }
                }
            }
            render();
        }
        
        function startTextInput(row, col) {
            const input = document.createElement('input');
            input.type = 'text';
            input.style.position = 'absolute';
            // Better alignment – account for canvas position + slight offset
            input.style.left = canvas.offsetLeft + col * charWidth + 2 + 'px';
            input.style.top = canvas.offsetTop + row * charHeight - 2 + 'px'; // slight upward nudge
            input.style.font = '12px JetBrains Mono';
            input.style.background = 'rgba(0, 212, 170, 0.25)';
            input.style.color = '#fff';
            input.style.border = '1px solid #00d4aa';
            input.style.padding = '1px 4px';
            input.style.width = '240px';
            input.style.height = charHeight + 2 + 'px';
            input.style.lineHeight = charHeight + 'px';
            input.style.zIndex = '1000';

            document.body.appendChild(input);
            input.focus();
            input.select();

            let committed = false;

            const commit = function() {
                if (committed) return;
                committed = true;
                const text = input.value.trim();
                if (text) {
                    saveUndo();
                    for (let i = 0; i < text.length; i++) {
                        const c = col + i;
                        if (c < COLS && row < ROWS) {
                            grid[row][c] = text[i];
                        }
                    }
                    render();
                }
                document.body.removeChild(input);
            };

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    commit();
                } else if (e.key === 'Escape') {
                    commit(); // just close without saving
                }
            });

            input.addEventListener('blur', commit);
        }
        
        function floodFill(startRow, startCol, targetChar, replacementChar) {
            if (startRow < 0 || startRow >= ROWS || startCol < 0 || startCol >= COLS) return;
            if (grid[startRow][startCol] !== targetChar) return;
            if (targetChar === replacementChar) return;
            
            const stack = [[startRow, startCol]];
            const visited = new Set();
            
            while (stack.length > 0) {
                const [row, col] = stack.pop();
                const key = row + ',' + col;
                
                if (visited.has(key)) continue;
                visited.add(key);
                
                if (row < 0 || row >= ROWS || col < 0 || col >= COLS) continue;
                if (grid[row][col] !== targetChar) continue;
                
                grid[row][col] = replacementChar;
                
                stack.push([row - 1, col]);
                stack.push([row + 1, col]);
                stack.push([row, col - 1]);
                stack.push([row, col + 1]);
            }
            render();
        }
        
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                col: Math.floor((e.clientX - rect.left) / charWidth),
                row: Math.floor((e.clientY - rect.top) / charHeight)
            };
        }

           TOOL FUNCTIONS
           =============================================
        
        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-tool="${tool}"]`)?.classList.add('active');
        }
        
        function clearCanvas() {
            saveUndo();
            grid = Array(ROWS).fill(null).map(() => Array(COLS).fill(' '));
            render();
        }
        
        function fillCanvas() {
            saveUndo();
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    grid[row][col] = currentChar;
                }
            }
            render();
        }
        
        function invertCanvas() {
            saveUndo();
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const char = grid[row][col];
                    if (char !== ' ') {
                        grid[row][col] = char === char.toUpperCase() ? char.toLowerCase() : char.toUpperCase();
                    }
                }
            }
            render();
        }
        
        function mirrorCanvas() {
            saveUndo();
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS / 2; col++) {
                    const source = grid[row][col];
                    const target = grid[row][COLS - 1 - col];
                    grid[row][COLS - 1 - col] = source;
                    grid[row][col] = target;
                }
            }
            render();
        }
        
        function centerContent() {
            saveUndo();
            const content = [];
            
            // Find all non-space characters
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    if (grid[row][col] !== ' ') {
                        content.push({row, col, char: grid[row][col]});
                    }
                }
            }
            
            if (content.length === 0) return;
            
            // Calculate bounds
            const minRow = Math.min(...content.map(c => c.row));
            const maxRow = Math.max(...content.map(c => c.row));
            const minCol = Math.min(...content.map(c => c.col));
            const maxCol = Math.max(...content.map(c => c.col));
            
            const height = maxRow - minRow + 1;
            const width = maxCol - minCol + 1;
            
            // Clear canvas
            grid = Array(ROWS).fill(null).map(() => Array(COLS).fill(' '));
            
            // Center content
            const centerRow = Math.floor((ROWS - height) / 2);
            const centerCol = Math.floor((COLS - width) / 2);
            
            content.forEach(cell => {
                const newRow = centerRow + (cell.row - minRow);
                const newCol = centerCol + (cell.col - minCol);
                if (newRow >= 0 && newRow < ROWS && newCol >= 0 && newCol < COLS) {
                    grid[newRow][newCol] = cell.char;
                }
            });
            
            render();
        }
        
        function generateRandomArt() {
            saveUndo();
            const chars = ['*', '#', '@', '+', '-', '=', '|', '/', '\\', '.', ':', 'o', 'x', '~'];
            
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    if (Math.random() > 0.7) {
                        grid[row][col] = chars[Math.floor(Math.random() * chars.length)];
                    }
                }
            }
            render();
        }
        
        // =============================================
           HISTORY MANAGEMENT
           =============================================
        
        function saveUndo() {
            const state = grid.map(row => [...row]);
            undoStack.push(state);
            if (undoStack.length > MAX_HISTORY) {
                undoStack.shift();
            }
            redoStack = [];
        }
        
        function undo() {
            if (undoStack.length > 0) {
                redoStack.push(grid.map(row => [...row]));
                grid = undoStack.pop();
                render();
            }
        }
        
        function redo() {
            if (redoStack.length > 0) {
                undoStack.push(grid.map(row => [...row]));
                grid = redoStack.pop();
                render();
            }
        }

           EXPORT FUNCTIONS

        function applyTemplate(templateName) {
            if (!templates[templateName]) return;

            const template = templates[templateName];

            const startRow = Math.floor((ROWS - lines.length) / 2);
            const startCol = Math.floor((COLS - Math.max(...lines.map(line => line.length))) / 2);
            
            for (let r = 0; r < lines.length && startRow + r < ROWS; r++) {
                for (let c = 0; c < lines[r].length && startCol + c < COLS; c++) {
                    grid[startRow + r][startCol + c] = lines[r][c];

        let apiKey = localStorage.getItem('openai_api_key') || '';
        let aiStatus = 'idle';
        
        function updateAIStatus(message, type = 'info') {
            const statusDiv = document.getElementById('aiStatus');
            const contentDiv = document.getElementById('aiStatusContent');
            
            if (statusDiv && contentDiv) {
                statusDiv.style.display = 'block';
                contentDiv.innerHTML = message;
                
                if (type === 'error') {
                    contentDiv.style.background = 'rgba(255, 107, 107, 0.2)';
                    contentDiv.style.color = '#fff';
                } else if (type === 'success') {
                    contentDiv.style.background = 'rgba(0, 200, 83, 0.2)';
                    contentDiv.style.color = '#fff';
                } else {
                    contentDiv.style.background = 'var(--bg-surface-2)';
                    contentDiv.style.color = 'var(--text-secondary)';
                }
            }
        }
        
        function callOpenAI(prompt, options = {}) {
            if (!apiKey) {
                updateAIStatus('⚠️ Please enter your OpenAI API key first', 'error');
                return;
            }
            
            updateAIStatus('🤖 Processing your request...', 'info');
            
            const requestBody = {
                model: 'gpt-3.5-turbo',
                messages: [{
                    role: 'user',
                    content: prompt
                }],
                max_tokens: 1000,
                temperature: 0.7,
                ...options
            };
            
            fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + apiKey
                },
                body: JSON.stringify(requestBody)
            })
            .then(response => response.json())
            .then(data => {
                if (data.choices && data.choices[0]) {
                    const aiResponse = data.choices[0].message.content;
                    updateAIStatus('✅ AI response received', 'success');
                    return aiResponse;
                } else {
                    updateAIStatus('❌ Error: ' + (data.error?.message || 'Unknown error'), 'error');
                    return null;
                }
            })
            .catch(error => {
                updateAIStatus('❌ Network error: ' + error.message, 'error');
                return null;
            });
        }
        
        function applyAIResponse(response, action) {
            if (!response) return;
            
            saveUndo();
            
            switch (action) {
                case 'ai-generate':
                    // Generate new ASCII art based on description
                    const lines = response.split('\n');
                    const startRow = Math.floor((ROWS - lines.length) / 2);
                    const startCol = Math.floor((COLS - Math.max(...lines.map(line => line.length))) / 2);
                    
                    for (let r = 0; r < lines.length && startRow + r < ROWS; r++) {
                        for (let c = 0; c < lines[r].length && startCol + c < COLS; c++) {
                            grid[startRow + r][startCol + c] = lines[r][c];
                        }
                    }
                    break;
                    
                case 'ai-enhance':
                    // Enhance current selection or canvas
                    if (selection) {
                        const selectedText = [];
                        for (let r = selection.startRow; r <= selection.endRow; r++) {
                            selectedText.push(grid[r].slice(selection.startCol, selection.endCol + 1).join(''));
                        }
                        
                        const enhancedPrompt = `Enhance this ASCII art:\n\n\n${selectedText.join('\n')}\n\nMake it more detailed, add shading, improve composition, fix any issues. Keep it as ASCII art.`;
                        
                        callOpenAI(enhancedPrompt).then(enhanced => {
                            if (enhanced) {
                                const lines = enhanced.split('\n');
                                for (let r = 0; r < lines.length && selection.startRow + r < ROWS; r++) {
                                    for (let c = 0; c < lines[r].length && selection.startCol + c < COLS; c++) {
                                        grid[selection.startRow + r][selection.startCol + c] = lines[r][c];
                                    }
                                }
                                render();
                            }
                        });
                    }
                    break;
                    
                case 'ai-complete':
                    // Complete or finish the current drawing
                    if (selection) {
                        const selectedText = [];
                        for (let r = selection.startRow; r <= selection.endRow; r++) {
                            selectedText.push(grid[r].slice(selection.startCol, selection.endCol + 1).join(''));
                        }
                        
                        const completePrompt = `Complete this ASCII art:\n\n\n${selectedText.join('\n')}\n\nFinish the drawing, add details, make it professional. Keep it as ASCII art format.`;
                        
                        callOpenAI(completePrompt).then(completed => {
                            if (completed) {
                                const lines = completed.split('\n');
                                for (let r = 0; r < lines.length && selection.startRow + r < ROWS; r++) {
                                    for (let c = 0; c < lines[r].length && selection.startCol + c < COLS; c++) {
                                        grid[selection.startRow + r][selection.startCol + c] = lines[r][c];
                                    }
                                }
                                render();
                            }
                        });
                    }
                    break;
                    
                case 'ai-style':
                    // Apply different artistic style
                    if (selection) {
                        const selectedText = [];
                        for (let r = selection.startRow; r <= selection.endRow; r++) {
                            selectedText.push(grid[r].slice(selection.startCol, selection.endCol + 1).join(''));
                        }
                        
                        const stylePrompt = `Restyle this ASCII art:\n\n\n${selectedText.join('\n')}\n\nApply a different artistic style (like 3D, retro, minimalist, cyberpunk, etc.). Keep it as ASCII art format.`;
                        
                        callOpenAI(stylePrompt).then(styled => {
                            if (styled) {
                                const lines = styled.split('\n');
                                for (let r = 0; r < lines.length && selection.startRow + r < ROWS; r++) {
                                    for (let c = 0; c < lines[r].length && selection.startCol + c < COLS; c++) {
                                        grid[selection.startRow + r][selection.startCol + c] = lines[r][c];
                                    }
                                }
                                render();
                            }
                        });
                    }
                    break;
                    
                case 'ai-optimize':
                    // Optimize and clean up
                    const currentContent = [];
                    for (let r = 0; r < ROWS; r++) {
                        for (let c = 0; c < COLS; c++) {
                            if (grid[r][c] !== ' ') {
                                currentContent.push({r, c, char: grid[r][c]});
                            }
                        }
                    }
                    
                    const optimizePrompt = `Optimize this ASCII art:\n\n\n${currentContent.map(item => item.char).join('')}\n\nClean up spacing, fix alignment, improve readability, remove unnecessary characters. Keep it as ASCII art format.`;
                    
                    callOpenAI(optimizePrompt).then(optimized => {
                        if (optimized) {
                            // Clear and redraw with optimized version
                            clearCanvas();
                            const lines = optimized.split('\n');
                            const startRow = Math.floor((ROWS - lines.length) / 2);
                            const startCol = Math.floor((COLS - Math.max(...lines.map(line => line.length))) / 2);
                            
                            for (let r = 0; r < lines.length && startRow + r < ROWS; r++) {
                                for (let c = 0; c < lines[r].length && startCol + c < COLS; c++) {
                                    grid[startRow + r][startCol + c] = lines[r][c];
                                }
                            }
                            render();
                        }
                    });
                    break;
                    
                case 'ai-explain':
                    // Explain current selection
                    if (selection) {
                        const selectedText = [];
                        for (let r = selection.startRow; r <= selection.endRow; r++) {
                            selectedText.push(grid[r].slice(selection.startCol, selection.endCol + 1).join(''));

                        const explainPrompt = `Explain this ASCII art:\n\n\n${selectedText.join('\n')}\n\nWhat does this ASCII art represent? How could it be improved? What techniques were used? Provide detailed analysis.`;
                        
                        callOpenAI(explainPrompt).then(explanation => {

                            }
                        });
                    }
                    break;

        }

        // Canvas mouse events
        canvas.addEventListener('mousedown', function(e) {
            isDrawing = true;
            startPos = getMousePos(e);
            lastPos = startPos;

            if (currentTool === 'freehand') {
                drawChar(startPos.row, startPos.col, currentChar);
            } else if (currentTool === 'text') {
                startTextInput(startPos.row, startPos.col);
                isDrawing = false;
            } else if (currentTool === 'fill') {
                const pos = getMousePos(e);
                saveUndo();
                floodFill(pos.row, pos.col, grid[pos.row][pos.col], currentChar);
                isDrawing = false;
            } else if (currentTool === 'select') {
                selection = {
                    startRow: startPos.row,
                    startCol: startPos.col,
                    endRow: startPos.row,
                    endCol: startPos.col
                };
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            const pos = getMousePos(e);
            lastPos = pos;

            if (!isDrawing) return;

            if (currentTool === 'freehand') {
                if (pos.row !== lastPos.row || pos.col !== lastPos.col) {
                    drawChar(pos.row, pos.col, currentChar);
                    lastPos = pos;
                }
            } else if (currentTool === 'select' && selection) {
                selection.endRow = pos.row;
                selection.endCol = pos.col;
                render();
            }
        });
        
        canvas.addEventListener('mouseup', (e) => {
            if (!isDrawing) return;
            isDrawing = false;

            const endPos = getMousePos(e);

            if (currentTool === 'line') {
                drawLine(startPos.col, startPos.row, endPos.col, endPos.row);
            } else if (currentTool === 'rectangle') {
                drawRectangle(startPos.col, startPos.row, endPos.col, endPos.row, currentChar, false);
            } else if (currentTool === 'rectangle-filled') {
                drawRectangle(startPos.col, startPos.row, endPos.col, endPos.row, currentChar, true);
            } else if (currentTool === 'select' && selection) {
                // Normalize selection
                const tempRow = selection.startRow;
                const tempCol = selection.startCol;
                selection.startRow = Math.min(selection.startRow, selection.endRow);
                selection.startCol = Math.min(selection.startCol, selection.endCol);
                selection.endRow = Math.max(tempRow, selection.endRow);
                selection.endCol = Math.max(tempCol, selection.endCol);
                render();
            }

            startPos = null;
        });
        
        canvas.addEventListener('mouseleave', () => {
            isDrawing = false;
        });
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            
            switch (e.key.toLowerCase()) {
                case 'z': if (e.ctrlKey) { e.preventDefault(); undo(); } break;
                case 'y': if (e.ctrlKey) { e.preventDefault(); redo(); } break;
                case 's': if (e.ctrlKey) { e.preventDefault(); exportASCII(); } break;
                case 'delete': clearCanvas(); break;
                case 'c': setTool('circle'); break;
                case 'r': setTool('rectangle'); break;
                case 'l': setTool('line'); break;
                case 'f': setTool('freehand'); break;
                case 't': setTool('text'); break;
                case '1': setTool('freehand'); break;
                case '2': setTool('line'); break;
                case '3': setTool('rectangle'); break;
                case '4': setTool('circle'); break;
                case '5': setTool('diamond'); break;
            }
        });
        
        // Header buttons
        document.getElementById('undoBtn').addEventListener('click', undo);
        document.getElementById('redoBtn').addEventListener('click', redo);
        document.getElementById('saveBtn').addEventListener('click', exportASCII);
        
        // Additional export functions
        function exportSVG() {
            const content = grid.map(row => row.join('')).join('\\n');
            const svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${canvas.width}" height="${canvas.height}">
<rect width="100%" height="100%" fill="#0f0f0f"/>
<text x="10" y="20" font-family="JetBrains Mono" font-size="12" fill="#ffffff" white-space="pre">
${content.replace(/</g, '&lt;').replace(/>/g, '&gt;')}
</text>
</svg>`;
            
            const blob = new Blob([svg], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ascii-art-${Date.now()}.svg`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function exportJSON() {
            const data = {
                grid: grid,
                metadata: {
                    cols: COLS,
                    rows: ROWS,
                    timestamp: Date.now(),
                    version: '7.0'
                }
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ascii-art-${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function exportHTML() {
            const content = grid.map(row => row.join('')).join('\\n');
            const html = `<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ASCII Art</title>
    <style>
        body {
            background: #0f0f0f;
            color: #ffffff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 1;
            white-space: pre;
            margin: 20px;
        }
    </style>
</head>
<body>
<pre>${content.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</pre>
</body>
</html>`;
            
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ascii-art-${Date.now()}.html`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function drawChar(row, col, char) {
            if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
                grid[row][col] = char;
                render();
            }
        }
        
        // =============================================
           INITIALIZATION
           =============================================
        
        // Initialize character palette
        initCharPalette();
        
        // Set initial tool
        setTool('freehand');
        
        // Initial render
        render();
        
        // Focus canvas for keyboard input
        canvas.focus();
        
        console.log('ASCII Canvas Studio v8.4 - Ready with Enhanced Tools!');
    </script>
</body>
</html>
