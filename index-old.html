<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Canvas Studio - Professional ASCII Art Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f0f0f;
            --bg-surface: #1a1a1a;
            --bg-surface-2: #252525;
            --border: #3a3a3a;
            --border-subtle: #2a2a2a;
            --accent: #00d4aa;
            --accent-hover: #00f5c2;
            --accent-light: rgba(0, 212, 170, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-tertiary: #808080;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --radius-sm: 4px;
            --radius-md: 8px;
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .app-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .left-panel {
            width: 320px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-subtle);
            padding: var(--space-md) var(--space-lg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .logo {
            font-family: var(--font-mono);
            font-size: 16px;
            font-weight: 600;
            color: var(--accent);
            text-decoration: none;
        }

        .canvas-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            position: relative;
            overflow: hidden;
        }

        .canvas-wrapper {
            flex: 1;
            position: relative;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #canvas {
            font-family: var(--font-mono);
            font-size: 12px;
            line-height: 1;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            background: #0f0f0f;
            cursor: crosshair;
        }

        .status-bar {
            background: var(--bg-surface);
            border-top: 1px solid var(--border-subtle);
            padding: var(--space-sm) var(--space-lg);
            display: flex;
            align-items: center;
            gap: var(--space-md);
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-secondary);
        }

        .tool-section {
            padding: var(--space-md);
            border-bottom: 1px solid var(--border-subtle);
        }

        .tool-section h3 {
            font-family: var(--font-sans);
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--space-md);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-sm);
        }

        .tool-btn {
            background: var(--bg-surface-2);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            padding: var(--space-sm);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-family: var(--font-sans);
            font-size: 11px;
            font-weight: 500;
            transition: var(--transition-fast);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-height: 60px;
        }

        .tool-btn:hover {
            background: var(--bg-surface-2);
            border-color: var(--accent);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        .tool-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #0f0f0f;
        }

        .tool-icon {
            font-size: 18px;
            line-height: 1;
        }

        .tool-label {
            font-size: 10px;
            text-align: center;
            line-height: 1.2;
        }

        #char-palette {
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
        }

        #apiKey {
            width: 100%;
            padding: 8px;
            background: var(--bg-surface-2);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: var(--radius-md);
            font-family: var(--font-mono);
            margin-bottom: 8px;
        }

        #aiStatus {
            display: none;
        }

        #aiStatusContent {
            padding: 8px;
            background: var(--bg-surface-2);
            border-radius: var(--radius-md);
            font-size: 11px;
            color: var(--text-secondary);
        }

        .header-info {
            display: flex;
            gap: var(--space-sm);
            align-items: center;
            font-family: var(--font-mono);
            font-size: 11px;
        }

        .header-btn {
            background: var(--accent);
            color: #0f0f0f;
            padding: 4px 8px;
            border-radius: var(--radius-md);
            font-size: 10px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            font-family: var(--font-mono);
        }

        .header-btn:hover {
            background: var(--accent-hover);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Left Panel -->
        <aside class="left-panel">
            <!-- Header -->
            <header class="header">
                <a href="#" class="logo">ASCII Studio</a>
                <div class="header-info">
                    <span style="background: var(--accent); color: #0f0f0f; padding: 2px 6px; border-radius: 4px; font-size: 10px;">v9.3</span>
                </div>
            </header>

            <!-- Drawing Tools -->
            <section class="tool-section">
                <h3>🎨 Drawing Tools</h3>
                <div class="tool-grid">
                    <button class="tool-btn" data-tool="freehand">
                        <span class="tool-icon">✏️</span>
                        <span class="tool-label">Freehand</span>
                    </button>
                    <button class="tool-btn" data-tool="line">
                        <span class="tool-icon">📏</span>
                        <span class="tool-label">Line</span>
                    </button>
                    <button class="tool-btn" data-tool="rectangle">
                        <span class="tool-icon">▢</span>
                        <span class="tool-label">Rectangle</span>
                    </button>
                    <button class="tool-btn" data-tool="text">
                        <span class="tool-icon">📝</span>
                        <span class="tool-label">Text</span>
                    </button>
                    <button class="tool-btn" data-tool="fill">
                        <span class="tool-icon">🪣</span>
                        <span class="tool-label">Fill</span>
                    </button>
                    <button class="tool-btn" data-tool="select">
                        <span class="tool-icon">🎯</span>
                        <span class="tool-label">Select</span>
                    </button>
                </div>
            </section>

            <!-- Quick Actions -->
            <section class="tool-section">
                <h3>⚡ Quick Actions</h3>
                <div class="tool-grid">
                    <button class="tool-btn" data-action="clear">
                        <span class="tool-icon">🗑️</span>
                        <span class="tool-label">Clear</span>
                    </button>
                    <button class="tool-btn" data-action="fill-all">
                        <span class="tool-icon">🪣</span>
                        <span class="tool-label">Fill All</span>
                    </button>
                    <button class="tool-btn" data-action="invert">
                        <span class="tool-icon">🔄</span>
                        <span class="tool-label">Invert</span>
                    </button>
                    <button class="tool-btn" data-action="mirror">
                        <span class="tool-icon">🪞</span>
                        <span class="tool-label">Mirror</span>
                    </button>
                    <button class="tool-btn" data-action="center">
                        <span class="tool-icon">⊕</span>
                        <span class="tool-label">Center</span>
                    </button>
                    <button class="tool-btn" data-action="random">
                        <span class="tool-icon">🎲</span>
                        <span class="tool-label">Random</span>
                    </button>
                </div>
            </section>

            <!-- Character Palette -->
            <div class="tool-section">
                <h3>✦ Character Palette</h3>
                <div id="char-palette" class="tool-grid"></div>
            </div>

            <!-- AI Assistant -->
            <div class="tool-section">
                <h3>🤖 AI Assistant</h3>
                <div class="tool-grid">
                    <button class="tool-btn" data-action="ai-generate">
                        <span class="tool-icon">🎨</span>
                        <span class="tool-label">Generate</span>
                    </button>
                    <button class="tool-btn" data-action="ai-enhance">
                        <span class="tool-icon">✨</span>
                        <span class="tool-label">Enhance</span>
                    </button>
                    <button class="tool-btn" data-action="ai-complete">
                        <span class="tool-icon">🔮</span>
                        <span class="tool-label">Complete</span>
                    </button>
                </div>
                <div class="tool-section" style="margin-top: 8px;">
                    <h3>🔑 API Key</h3>
                    <input type="password" id="apiKey" placeholder="Enter OpenAI API Key">
                    <button class="tool-btn" id="saveApiKey" style="width: 100%;">
                        <span class="tool-icon">💾</span>
                        <span class="tool-label">Save Key</span>
                    </button>
                </div>
            </div>

            <!-- AI Status -->
            <div class="tool-section" id="aiStatus">
                <h3>🤖 AI Status</h3>
                <div id="aiStatusContent"></div>
            </div>

            <!-- Export Options -->
            <section class="tool-section">
                <h3>💾 Export</h3>
                <div class="tool-grid">
                    <button class="tool-btn" data-export="ascii">
                        <span class="tool-icon">📄</span>
                        <span class="tool-label">ASCII</span>
                    </button>
                    <button class="tool-btn" data-export="png">
                        <span class="tool-icon">🖼️</span>
                        <span class="tool-label">PNG</span>
                    </button>
                    <button class="tool-btn" data-export="txt">
                        <span class="tool-icon">📝</span>
                        <span class="tool-label">TXT</span>
                    </button>
                </div>
            </section>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Canvas Header -->
            <header class="header">
                <div class="header-info">
                    <span>Position: <span id="cursorPos">0, 0</span></span>
                    <span>Tool: <span id="currentTool">Freehand</span></span>
                    <span>Zoom: <span id="zoomLevel">100%</span></span>
                </div>
                <div class="header-info">
                    <button class="header-btn" id="undoBtn">↶ Undo</button>
                    <button class="header-btn" id="redoBtn">↷ Redo</button>
                    <button class="header-btn" id="saveBtn">💾 Save</button>
                </div>
            </header>

            <!-- Canvas Container -->
            <div class="canvas-container">
                <div class="canvas-wrapper">
                    <canvas id="canvas"></canvas>
                </div>
            </div>

            <!-- Status Bar -->
            <footer class="status-bar">
                <span>Size: <span id="canvasSize">200×80</span></span>
                <span>Chars: <span id="charCount">0</span></span>
                <span>Lines: <span id="lineCount">0</span></span>
                <span>Selection: <span id="selectionInfo">None</span></span>
            </footer>
        </main>
    </div>

    <script>
        // CANVAS SETUP
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        
        // Canvas dimensions
        var COLS = 200;
        var ROWS = 80;
        var charWidth = 8;
        var charHeight = 12;
        
        canvas.width = COLS * charWidth;
        canvas.height = ROWS * charHeight;
        
        // Grid data
        var grid = Array(ROWS).fill(null).map(function() { 
            return Array(COLS).fill(' '); 
        });
        
        // Current state
        var currentTool = 'freehand';
        var currentChar = '*';
        var isDrawing = false;
        var lastPos = null;
        var startPos = null;
        var selectedCharIndex = 0;
        var clipboard = null;
        var apiKey = localStorage.getItem('openai_api_key') || '';
        var aiStatus = 'idle';
        var selection = null;
        var undoStack = [];
        var redoStack = [];
        var MAX_HISTORY = 50;
        
        // Character palette
        var charPalette = [
            ' ', '.', ',', ':', ';', '-', '=', '+', '*', '#', '@', '%', '$', '&', '0', 'O',
            '│', '─', '┌', '┐', '└', '┘', '├', '┤', '┬', '┴', '┼', '╭', '╮', '╰', '╯',
            '█', '▓', '▒', '░', '■', '□', '◆', '◇', '▲', '▼', '▶', '◀', '★', '☆', '→', '←',
            '(', ')', '[', ']', '{', '}', '<', '>', '/', '\\', '|', '_', '~', '`', '"', "'"
        ];
        
        // CHARACTER PALETTE
        function initCharPalette() {
            var palette = document.getElementById('char-palette');
            charPalette.forEach(function(ch, i) {
                var btn = document.createElement('button');
                btn.className = 'tool-btn';
                btn.style.fontSize = '16px';
                btn.style.padding = '8px';
                btn.textContent = ch === ' ' ? '␣' : ch;
                btn.title = ch === ' ' ? 'Space' : ch;
                if (i === selectedCharIndex) btn.classList.add('active');
                
                btn.addEventListener('click', function() {
                    currentChar = ch;
                    selectedCharIndex = i;
                    var buttons = document.querySelectorAll('#char-palette .tool-btn');
                    buttons.forEach(function(b) { 
                        b.classList.remove('active'); 
                    });
                    btn.classList.add('active');
                });
                
                palette.appendChild(btn);
            });
        }
        
        // RENDERING SYSTEM
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background
            ctx.fillStyle = '#0f0f0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.fillStyle = '#ffffff';
            ctx.font = '12px JetBrains Mono';
            
            for (var row = 0; row < ROWS; row++) {
                for (var col = 0; col < COLS; col++) {
                    var char = grid[row][col];
                    if (char !== ' ') {
                        ctx.fillText(char, col * charWidth, row * charHeight);
                    }
                }
            }
            
            // Draw selection
            if (selection) {
                ctx.strokeStyle = '#00d4aa';
                ctx.lineWidth = 2;
                ctx.strokeRect(
                    selection.startCol * charWidth,
                    selection.startRow * charHeight,
                    (selection.endCol - selection.startCol + 1) * charWidth,
                    (selection.endRow - selection.startRow + 1) * charHeight
                );
            }
            
            updateInfo();
        }
        
        // INFO UPDATES
        function updateInfo() {
            document.getElementById('cursorPos').textContent = 
                lastPos ? lastPos.col + ', ' + lastPos.row : '0, 0';
            
            var toolName = currentTool.charAt(0).toUpperCase() + currentTool.slice(1);
            if (currentChar !== ' ') {
                toolName += ' (' + currentChar + ')';
            } else {
                toolName += ' (space)';
            }
            document.getElementById('currentTool').textContent = toolName;
            document.getElementById('zoomLevel').textContent = '100%';
            
            // Count characters and lines
            var charCount = 0;
            var lineCount = 0;
            
            for (var row = 0; row < ROWS; row++) {
                var hasContent = false;
                for (var col = 0; col < COLS; col++) {
                    if (grid[row][col] !== ' ') {
                        charCount++;
                        hasContent = true;
                    }
                }
                if (hasContent) {
                    lineCount++;
                }
            }
            
            document.getElementById('canvasSize').textContent = COLS + '×' + ROWS;
            document.getElementById('charCount').textContent = charCount;
            document.getElementById('lineCount').textContent = lineCount;
            
            // Selection info
            if (selection) {
                var width = selection.endCol - selection.startCol + 1;
                var height = selection.endRow - selection.startRow + 1;
                document.getElementById('selectionInfo').textContent = width + '×' + height;
            } else {
                document.getElementById('selectionInfo').textContent = 'None';
            }
        }
        
        // DRAWING FUNCTIONS
        function drawChar(row, col, char) {
            if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
                grid[row][col] = char;
                render();
            }
        }
        
        function drawLine(x0, y0, x1, y1, char) {
            saveUndo();
            
            var dx = Math.abs(x1 - x0);
            var dy = Math.abs(y1 - y0);
            var sx = x0 < x1 ? 1 : -1;
            var sy = y0 < y1 ? 1 : -1;
            var err = dx - dy;
            
            while (true) {
                if (x0 >= 0 && x0 < COLS && y0 >= 0 && y0 < ROWS) {
                    grid[y0][x0] = char || currentChar;
                }
                if (x0 === x1 && y0 === y1) break;
                
                var e2 = 2 * err;
                if (e2 > -dy) { 
                    err -= dy; 
                    x0 += sx; 
                }
                if (e2 < dx) { 
                    err += dx; 
                    y0 += sy; 
                }
            }
            render();
        }
        
        function drawRectangle(x0, y0, x1, y1, char, filled) {
            saveUndo();
            
            var minX = Math.min(x0, x1);
            var maxX = Math.max(x0, x1);
            var minY = Math.min(y0, y1);
            var maxY = Math.max(y0, y1);
            
            for (var y = minY; y <= maxY; y++) {
                for (var x = minX; x <= maxX; x++) {
                    if (filled || y === minY || y === maxY || x === minX || x === maxX) {
                        if (y >= 0 && y < ROWS && x >= 0 && x < COLS) {
                            grid[y][x] = char || currentChar;
                        }
                    }
                }
            }
            render();
        }
        
        function startTextInput(row, col) {
            var input = document.createElement('input');
            input.type = 'text';
            input.style.position = 'absolute';
            input.style.left = canvas.offsetLeft + col * charWidth + 2 + 'px';
            input.style.top = canvas.offsetTop + row * charHeight - 2 + 'px';
            input.style.font = '12px JetBrains Mono';
            input.style.background = 'rgba(0, 212, 170, 0.25)';
            input.style.color = '#fff';
            input.style.border = '1px solid #00d4aa';
            input.style.padding = '1px 4px';
            input.style.width = '240px';
            input.style.height = charHeight + 2 + 'px';
            input.style.lineHeight = charHeight + 'px';
            input.style.zIndex = '1000';

            document.body.appendChild(input);
            input.focus();
            input.select();

            var committed = false;

            var commit = function() {
                if (committed) return;
                committed = true;
                var text = input.value.trim();
                if (text) {
                    saveUndo();
                    for (var i = 0; i < text.length; i++) {
                        var c = col + i;
                        if (c < COLS && row < ROWS) {
                            grid[row][c] = text[i];
                        }
                    }
                    render();
                }
                document.body.removeChild(input);
            };

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    commit();
                } else if (e.key === 'Escape') {
                    commit();
                }
            });

            input.addEventListener('blur', commit);
        }
        
        function floodFill(startRow, startCol, targetChar, replacementChar) {
            if (startRow < 0 || startRow >= ROWS || startCol < 0 || startCol >= COLS) return;
            if (grid[startRow][startCol] !== targetChar) return;
            if (targetChar === replacementChar) return;
            
            var stack = [[startRow, startCol]];
            var visited = new Set();
            
            while (stack.length > 0) {
                var item = stack.pop();
                var row = item[0];
                var col = item[1];
                var key = row + ',' + col;
                
                if (visited.has(key)) continue;
                visited.add(key);
                
                if (row < 0 || row >= ROWS || col < 0 || col >= COLS) continue;
                if (grid[row][col] !== targetChar) continue;
                
                grid[row][col] = replacementChar;
                
                stack.push([row - 1, col]);
                stack.push([row + 1, col]);
                stack.push([row, col - 1]);
                stack.push([row, col + 1]);
            }
            render();
        }
        
        function getMousePos(e) {
            var rect = canvas.getBoundingClientRect();
            return {
                col: Math.floor((e.clientX - rect.left) / charWidth),
                row: Math.floor((e.clientY - rect.top) / charHeight)
            };
        }
        
        // TOOL FUNCTIONS
        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(function(btn) {
                btn.classList.remove('active');
            });
            var toolBtn = document.querySelector('[data-tool="' + tool + '"]');
            if (toolBtn) toolBtn.classList.add('active');
        }
        
        function clearCanvas() {
            saveUndo();
            grid = Array(ROWS).fill(null).map(function() { 
                return Array(COLS).fill(' '); 
            });
            render();
        }
        
        function fillCanvas() {
            saveUndo();
            for (var row = 0; row < ROWS; row++) {
                for (var col = 0; col < COLS; col++) {
                    grid[row][col] = currentChar;
                }
            }
            render();
        }
        
        function saveUndo() {
            var state = grid.map(function(row) { 
                return row.slice(); 
            });
            undoStack.push(state);
            if (undoStack.length > MAX_HISTORY) {
                undoStack.shift();
            }
            redoStack = [];
        }
        
        function undo() {
            if (undoStack.length > 0) {
                redoStack.push(grid.map(function(row) { 
                    return row.slice(); 
                }));
                grid = undoStack.pop();
                render();
            }
        }
        
        function redo() {
            if (redoStack.length > 0) {
                undoStack.push(grid.map(function(row) { 
                    return row.slice(); 
                }));
                grid = redoStack.pop();
                render();
            }
        }
        
        // AI FUNCTIONS
        function updateAIStatus(message, type) {
            type = type || 'info';
            var statusDiv = document.getElementById('aiStatus');
            var contentDiv = document.getElementById('aiStatusContent');
            
            if (statusDiv && contentDiv) {
                statusDiv.style.display = 'block';
                contentDiv.innerHTML = message;
                
                if (type === 'error') {
                    contentDiv.style.background = 'rgba(255, 107, 107, 0.2)';
                    contentDiv.style.color = '#fff';
                } else if (type === 'success') {
                    contentDiv.style.background = 'rgba(0, 200, 83, 0.2)';
                    contentDiv.style.color = '#fff';
                } else {
                    contentDiv.style.background = 'var(--bg-surface-2)';
                    contentDiv.style.color = 'var(--text-secondary)';
                }
            }
        }
        
        function callOpenAI(prompt) {
            if (!apiKey) {
                updateAIStatus('⚠️ Please enter your OpenAI API key first', 'error');
                return Promise.resolve(null);
            }
            
            updateAIStatus('🤖 Processing your request...', 'info');
            
            var requestBody = {
                model: 'gpt-3.5-turbo',
                messages: [{
                    role: 'user',
                    content: prompt
                }],
                max_tokens: 1000,
                temperature: 0.7
            };
            
            return fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + apiKey
                },
                body: JSON.stringify(requestBody)
            })
            .then(function(response) { 
                return response.json(); 
            })
            .then(function(data) {
                if (data.choices && data.choices[0]) {
                    var aiResponse = data.choices[0].message.content;
                    updateAIStatus('✅ AI response received', 'success');
                    return aiResponse;
                } else {
                    var errorMsg = data.error && data.error.message ? data.error.message : 'Unknown error';
                    updateAIStatus('❌ Error: ' + errorMsg, 'error');
                    return null;
                }
            })
            .catch(function(error) {
                updateAIStatus('❌ Network error: ' + error.message, 'error');
                return null;
            });
        }
        
        // EXPORT FUNCTIONS
        function exportASCII() {
            var content = grid.map(function(row) { 
                return row.join(''); 
            }).join('\n');
            var blob = new Blob([content], { type: 'text/plain' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'ascii-art-' + Date.now() + '.txt';
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function exportPNG() {
            var link = document.createElement('a');
            link.download = 'ascii-art-' + Date.now() + '.png';
            link.href = canvas.toDataURL();
            link.click();
        }
        
        // EVENT LISTENERS
        // Tool selection
        document.querySelectorAll('[data-tool]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                setTool(btn.dataset.tool);
            });
        });
        
        // Quick actions
        document.querySelectorAll('[data-action]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var action = btn.dataset.action;
                switch (action) {
                    case 'clear': 
                        clearCanvas(); 
                        break;
                    case 'fill-all': 
                        fillCanvas(); 
                        break;
                    case 'invert': 
                        saveUndo();
                        for (var r = 0; r < ROWS; r++) {
                            for (var c = 0; c < COLS; c++) {
                                var char = grid[r][c];
                                if (char !== ' ') {
                                    grid[r][c] = char === char.toUpperCase() ? 
                                        char.toLowerCase() : char.toUpperCase();
                                }
                            }
                        }
                        render();
                        break;
                    case 'ai-generate':
                        var prompt = 'Generate creative ASCII art. Include details, shading, and make it visually appealing.';
                        callOpenAI(prompt).then(function(response) {
                            if (response) {
                                saveUndo();
                                var lines = response.split('\n');
                                var startRow = Math.floor((ROWS - lines.length) / 2);
                                var maxLineLength = Math.max.apply(Math, lines.map(function(line) { 
                                    return line.length; 
                                }));
                                var startCol = Math.floor((COLS - maxLineLength) / 2);
                                
                                for (var r = 0; r < lines.length && startRow + r < ROWS; r++) {
                                    for (var c = 0; c < lines[r].length && startCol + c < COLS; c++) {
                                        grid[startRow + r][startCol + c] = lines[r][c];
                                    }
                                }
                                render();
                            }
                        });
                        break;
                    case 'ai-enhance':
                        updateAIStatus('✨ Select an area to enhance', 'info');
                        break;
                    case 'ai-complete':
                        updateAIStatus('🔮 Select an area to complete', 'info');
                        break;
                }
            });
        });
        
        // Export options
        document.querySelectorAll('[data-export]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var format = btn.dataset.export;
                switch (format) {
                    case 'ascii': 
                        exportASCII(); 
                        break;
                    case 'png': 
                        exportPNG(); 
                        break;
                    case 'txt': 
                        exportASCII(); 
                        break;
                }
            });
        });
        
        // API Key management
        document.getElementById('saveApiKey').addEventListener('click', function() {
            var keyInput = document.getElementById('apiKey');
            var key = keyInput.value.trim();
            if (key) {
                localStorage.setItem('openai_api_key', key);
                apiKey = key;
                updateAIStatus('✅ API Key saved successfully', 'success');
            }
        });
        
        // Canvas mouse events
        canvas.addEventListener('mousedown', function(e) {
            isDrawing = true;
            startPos = getMousePos(e);
            lastPos = startPos;

            if (currentTool === 'freehand') {
                drawChar(startPos.row, startPos.col, currentChar);
            } else if (currentTool === 'text') {
                startTextInput(startPos.row, startPos.col);
                isDrawing = false;
            } else if (currentTool === 'fill') {
                var pos = getMousePos(e);
                saveUndo();
                floodFill(pos.row, pos.col, grid[pos.row][pos.col], currentChar);
                isDrawing = false;
            } else if (currentTool === 'select') {
                selection = {
                    startRow: startPos.row,
                    startCol: startPos.col,
                    endRow: startPos.row,
                    endCol: startPos.col
                };
            }
        });
        
        canvas.addEventListener('mousemove', function(e) {
            var pos = getMousePos(e);
            lastPos = pos;

            if (!isDrawing) return;

            if (currentTool === 'freehand') {
                if (pos.row !== lastPos.row || pos.col !== lastPos.col) {
                    drawChar(pos.row, pos.col, currentChar);
                    lastPos = pos;
                }
            } else if (currentTool === 'select' && selection) {
                selection.endRow = pos.row;
                selection.endCol = pos.col;
                render();
            }
        });
        
        canvas.addEventListener('mouseup', function(e) {
            if (!isDrawing) return;
            isDrawing = false;

            var endPos = getMousePos(e);

            if (currentTool === 'line') {
                drawLine(startPos.col, startPos.row, endPos.col, endPos.row);
            } else if (currentTool === 'rectangle') {
                drawRectangle(startPos.col, startPos.row, endPos.col, endPos.row, currentChar, false);
            } else if (currentTool === 'select' && selection) {
                // Normalize selection
                var tempRow = selection.startRow;
                var tempCol = selection.startCol;
                selection.startRow = Math.min(selection.startRow, selection.endRow);
                selection.startCol = Math.min(selection.startCol, selection.endCol);
                selection.endRow = Math.max(tempRow, selection.endRow);
                selection.endCol = Math.max(tempCol, selection.endCol);
                render();
            }

            startPos = null;
        });
        
        canvas.addEventListener('mouseleave', function() {
            isDrawing = false;
        });
        
        // Header buttons
        document.getElementById('undoBtn').addEventListener('click', undo);
        document.getElementById('redoBtn').addEventListener('click', redo);
        document.getElementById('saveBtn').addEventListener('click', exportASCII);
        
        // INITIALIZATION
        // Initialize character palette
        initCharPalette();
        
        // Load saved API key
        var savedKey = localStorage.getItem('openai_api_key');
        if (savedKey) {
            apiKey = savedKey;
            document.getElementById('apiKey').value = savedKey;
        }
        
        // Set initial tool
        setTool('freehand');
        
        // Initial render
        render();
        
        // Focus canvas for keyboard input
        canvas.focus();
        
        console.log('ASCII Canvas Studio v9.3 - All Buttons Functional!');
    </script>
</body>
</html>
