<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Canvas Studio - Professional ASCII Art Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Color System */
            --bg-primary: #0a0a0a;
            --bg-surface: #1a1a1a;
            --bg-surface-2: #2a2a2a;
            --bg-surface-3: #3a3a3a;
            --border: #4a4a4a;
            --border-subtle: #2a2a2a;
            
            /* Brand Colors */
            --accent: #00d4aa;
            --accent-hover: #00f5c2;
            --accent-light: rgba(0, 212, 170, 0.1);
            --accent-gradient: linear-gradient(135deg, #00d4aa, #00a8cc);
            
            /* Semantic Colors */
            --success: #00c896;
            --warning: #ffb347;
            --error: #ff6b6b;
            --info: #4dabf7;
            
            /* Text Colors */
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-tertiary: #808080;
            --text-inverse: #0a0a0a;
            
            /* Typography */
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
            --font-size-xs: 11px;
            --font-size-sm: 12px;
            --font-size-base: 14px;
            --font-size-lg: 16px;
            --font-size-xl: 18px;
            
            /* Spacing */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 12px;
            --space-lg: 16px;
            --space-xl: 20px;
            --space-2xl: 24px;
            
            /* Border Radius */
            --radius-sm: 4px;
            --radius-md: 6px;
            --radius-lg: 8px;
            --radius-xl: 12px;
            
            /* Transitions */
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-normal: 250ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 350ms cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Shadows */
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.25);
            --shadow-glow: 0 0 20px rgba(0, 212, 170, 0.3);
        }

        /* =============================================
           BASE STYLES
           ============================================= */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-size: var(--font-size-base);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* =============================================
           LAYOUT COMPONENTS
           ============================================= */
        
        .app-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .left-panel {
            width: 360px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-subtle);
            padding: var(--space-md) var(--space-xl);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            min-height: 60px;
        }

        .logo {
            font-family: var(--font-mono);
            font-size: var(--font-size-lg);
            font-weight: 600;
            color: var(--accent);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .logo-icon {
            font-size: var(--font-size-xl);
        }

        .header-info {
            display: flex;
            gap: var(--space-md);
            align-items: center;
        }

        .info-badge {
            background: var(--accent);
            color: var(--text-inverse);
            padding: var(--space-xs) var(--space-sm);
            border-radius: var(--radius-md);
            font-size: var(--font-size-xs);
            font-weight: 500;
        }

        .canvas-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            position: relative;
            overflow: hidden;
        }

        .canvas-wrapper {
            flex: 1;
            position: relative;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: 
                linear-gradient(45deg, #1a1a1a 25%, transparent 25%),
                linear-gradient(-45deg, #1a1a1a 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #1a1a1a 75%),
                linear-gradient(-45deg, transparent 75%, #1a1a1a 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        #canvas {
            font-family: var(--font-mono);
            font-size: 12px;
            line-height: 1;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            will-change: transform;
            transform-origin: 0 0;
            transition: transform var(--transition-fast);
            background: var(--bg-primary);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            cursor: crosshair;
        }

        .status-bar {
            background: var(--bg-surface);
            border-top: 1px solid var(--border-subtle);
            padding: var(--space-sm) var(--space-xl);
            display: flex;
            align-items: center;
            gap: var(--space-lg);
            font-family: var(--font-mono);
            font-size: var(--font-size-xs);
            color: var(--text-secondary);
            min-height: 32px;
        }

        /* =============================================
           TOOL PANEL COMPONENTS
           ============================================= */
        
        .tool-section {
            padding: var(--space-lg);
            border-bottom: 1px solid var(--border-subtle);
        }

        .tool-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-md);
        }

        .tool-section h3 {
            font-family: var(--font-sans);
            font-size: var(--font-size-sm);
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            margin: 0;
        }

        .tool-section-icon {
            font-size: var(--font-size-base);
        }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-sm);
        }

        .tool-grid-2x {
            grid-template-columns: repeat(2, 1fr);
        }

        .tool-grid-4x {
            grid-template-columns: repeat(4, 1fr);
        }

        .tool-grid-8x {
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
        }

        .tool-btn {
            background: var(--bg-surface-2);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            padding: var(--space-md);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-family: var(--font-sans);
            font-size: var(--font-size-xs);
            font-weight: 500;
            transition: var(--transition-fast);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-xs);
            min-height: 64px;
            position: relative;
            overflow: hidden;
        }

        .tool-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--accent-gradient);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .tool-btn:hover {
            background: var(--bg-surface-3);
            border-color: var(--accent);
            color: var(--text-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .tool-btn:hover::before {
            opacity: 0.1;
        }

        .tool-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--text-inverse);
            box-shadow: var(--shadow-glow);
        }

        .tool-btn.active::before {
            opacity: 1;
        }

        .tool-icon {
            font-size: var(--font-size-lg);
            line-height: 1;
            z-index: 1;
        }

        .tool-label {
            font-size: var(--font-size-xs);
            text-align: center;
            line-height: 1.2;
            z-index: 1;
        }

        /* =============================================
           CHARACTER PALETTE
           ============================================= */
        
        #char-palette .tool-btn {
            min-height: 40px;
            padding: var(--space-sm);
            font-size: var(--font-size-sm);
        }

        #char-palette .tool-btn.active {
            background: var(--accent);
            color: var(--text-inverse);
        }

        /* =============================================
           INPUT COMPONENTS
           ============================================= */
        
        .input-group {
            margin-bottom: var(--space-md);
        }

        .input-label {
            display: block;
            font-size: var(--font-size-xs);
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: var(--space-xs);
        }

        .input-field {
            width: 100%;
            padding: var(--space-sm);
            background: var(--bg-surface-2);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: var(--radius-md);
            font-family: var(--font-mono);
            font-size: var(--font-size-sm);
            transition: var(--transition-fast);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-light);
        }

        /* =============================================
           AI STATUS
           ============================================= */
        
        #aiStatus {
            display: none;
        }

        #aiStatusContent {
            padding: var(--space-md);
            background: var(--bg-surface-2);
            border-radius: var(--radius-md);
            font-size: var(--font-size-xs);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            min-height: 60px;
        }

        /* =============================================
           HEADER BUTTONS
           ============================================= */
        
        .header-btn {
            background: var(--bg-surface-2);
            color: var(--text-secondary);
            padding: var(--space-xs) var(--space-sm);
            border-radius: var(--radius-md);
            font-size: var(--font-size-xs);
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border-subtle);
            font-family: var(--font-mono);
            transition: var(--transition-fast);
            display: flex;
            align-items: center;
            gap: var(--space-xs);
        }

        .header-btn:hover {
            background: var(--accent);
            color: var(--text-inverse);
            border-color: var(--accent);
        }

        .header-btn:active {
            transform: translateY(1px);
        }

        /* =============================================
           TOOLBAR
           ============================================= */
        
        .toolbar {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-subtle);
            padding: var(--space-sm) var(--space-lg);
            display: flex;
            align-items: center;
            gap: var(--space-md);
            flex-wrap: wrap;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            padding: 0 var(--space-sm);
            border-right: 1px solid var(--border-subtle);
        }

        .toolbar-group:last-child {
            border-right: none;
        }

        .toolbar-btn {
            background: var(--bg-surface-2);
            color: var(--text-secondary);
            padding: var(--space-xs) var(--space-sm);
            border-radius: var(--radius-sm);
            font-size: var(--font-size-xs);
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border-subtle);
            font-family: var(--font-sans);
            transition: var(--transition-fast);
            display: flex;
            align-items: center;
            gap: var(--space-xs);
        }

        .toolbar-btn:hover {
            background: var(--accent);
            color: var(--text-inverse);
            border-color: var(--accent);
        }

        .toolbar-btn.active {
            background: var(--accent);
            color: var(--text-inverse);
        }

        /* =============================================
           MOBILE RESPONSIVE
           ============================================= */
        
        @media (max-width: 768px) {
            .left-panel {
                width: 320px;
            }
            
            .tool-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .left-panel {
                position: absolute;
                z-index: 200;
                transform: translateX(-100%);
                transition: transform var(--transition-normal);
            }
            
            .left-panel.mobile-open {
                transform: translateX(0);
            }
            
            .tool-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Left Panel -->
        <aside class="left-panel">
            <!-- Header -->
            <header class="header">
                <a href="#" class="logo">
                    <span class="logo-icon">🎨</span>
                    ASCII Studio
                </a>
                <div class="header-info">
                    <span class="info-badge">v10.0</span>
                </div>
            </header>

            <!-- Toolbar -->
            <div class="toolbar">
                <div class="toolbar-group">
                    <button class="toolbar-btn" id="undoBtn" title="Undo">
                        <span>↶</span>
                    </button>
                    <button class="toolbar-btn" id="redoBtn" title="Redo">
                        <span>↷</span>
                    </button>
                </div>
                <div class="toolbar-group">
                    <button class="toolbar-btn" id="saveBtn" title="Save">
                        <span>💾</span>
                    </button>
                    <button class="toolbar-btn" id="loadBtn" title="Load">
                        <span>📁</span>
                    </button>
                </div>
            </div>

            <!-- Drawing Tools -->
            <section class="tool-section">
                <div class="tool-section-header">
                    <h3>
                        <span class="tool-section-icon">🎨</span>
                        Drawing Tools
                    </h3>
                </div>
                <div class="tool-grid">
                    <button class="tool-btn active" data-tool="freehand">
                        <span class="tool-icon">✏️</span>
                        <span class="tool-label">Freehand</span>
                    </button>
                    <button class="tool-btn" data-tool="line">
                        <span class="tool-icon">📏</span>
                        <span class="tool-label">Line</span>
                    </button>
                    <button class="tool-btn" data-tool="rectangle">
                        <span class="tool-icon">▢</span>
                        <span class="tool-label">Rectangle</span>
                    </button>
                    <button class="tool-btn" data-tool="filled-rectangle">
                        <span class="tool-icon">▣</span>
                        <span class="tool-label">Filled Rect</span>
                    </button>
                    <button class="tool-btn" data-tool="circle">
                        <span class="tool-icon">○</span>
                        <span class="tool-label">Circle</span>
                    </button>
                    <button class="tool-btn" data-tool="ellipse">
                        <span class="tool-icon">⬭</span>
                        <span class="tool-label">Ellipse</span>
                    </button>
                    <button class="tool-btn" data-tool="text">
                        <span class="tool-icon">📝</span>
                        <span class="tool-label">Text</span>
                    </button>
                    <button class="tool-btn" data-tool="fill">
                        <span class="tool-icon">🪣</span>
                        <span class="tool-label">Fill</span>
                    </button>
                    <button class="tool-btn" data-tool="select">
                        <span class="tool-icon">🎯</span>
                        <span class="tool-label">Select</span>
                    </button>
                </div>
            </section>

            <!-- Brush Settings -->
            <section class="tool-section">
                <div class="tool-section-header">
                    <h3>
                        <span class="tool-section-icon">🖌️</span>
                        Brush Settings
                    </h3>
                </div>
                <div class="input-group">
                    <label class="input-label">Brush Size</label>
                    <select class="input-field" id="brushSize">
                        <option value="1">1px (Fine)</option>
                        <option value="2">2px (Small)</option>
                        <option value="3">3px (Medium)</option>
                        <option value="4">4px (Large)</option>
                        <option value="5">5px (Extra Large)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label class="input-label">Brush Style</label>
                    <select class="input-field" id="brushStyle">
                        <option value="solid">Solid</option>
                        <option value="dotted">Dotted</option>
                        <option value="dashed">Dashed</option>
                        <option value="shaded">Shaded</option>
                    </select>
                </div>
            </section>

            <!-- Character Palette -->
            <section class="tool-section">
                <div class="tool-section-header">
                    <h3>
                        <span class="tool-section-icon">✦</span>
                        Character Palette
                    </h3>
                </div>
                <div id="char-palette" class="tool-grid-8x"></div>
            </section>

            <!-- Quick Actions -->
            <section class="tool-section">
                <div class="tool-section-header">
                    <h3>
                        <span class="tool-section-icon">⚡</span>
                        Quick Actions
                    </h3>
                </div>
                <div class="tool-grid tool-grid-2x">
                    <button class="tool-btn" data-action="clear">
                        <span class="tool-icon">🗑️</span>
                        <span class="tool-label">Clear Canvas</span>
                    </button>
                    <button class="tool-btn" data-action="fill-all">
                        <span class="tool-icon">🪣</span>
                        <span class="tool-label">Fill All</span>
                    </button>
                    <button class="tool-btn" data-action="invert">
                        <span class="tool-icon">🔄</span>
                        <span class="tool-label">Invert</span>
                    </button>
                    <button class="tool-btn" data-action="mirror-h">
                        <span class="tool-icon">🪞</span>
                        <span class="tool-label">Mirror H</span>
                    </button>
                    <button class="tool-btn" data-action="mirror-v">
                        <span class="tool-icon">↕️</span>
                        <span class="tool-label">Mirror V</span>
                    </button>
                    <button class="tool-btn" data-action="rotate">
                        <span class="tool-icon">🔄</span>
                        <span class="tool-label">Rotate</span>
                    </button>
                    <button class="tool-btn" data-action="center">
                        <span class="tool-icon">⊕</span>
                        <span class="tool-label">Center</span>
                    </button>
                    <button class="tool-btn" data-action="random">
                        <span class="tool-icon">🎲</span>
                        <span class="tool-label">Random Art</span>
                    </button>
                </div>
            </section>

            <!-- AI Assistant -->
            <section class="tool-section">
                <div class="tool-section-header">
                    <h3>
                        <span class="tool-section-icon">🤖</span>
                        AI Assistant
                    </h3>
                </div>
                <div class="tool-grid tool-grid-2x">
                    <button class="tool-btn" data-action="ai-generate">
                        <span class="tool-icon">🎨</span>
                        <span class="tool-label">Generate</span>
                    </button>
                    <button class="tool-btn" data-action="ai-enhance">
                        <span class="tool-icon">✨</span>
                        <span class="tool-label">Enhance</span>
                    </button>
                    <button class="tool-btn" data-action="ai-complete">
                        <span class="tool-icon">🔮</span>
                        <span class="tool-label">Complete</span>
                    </button>
                    <button class="tool-btn" data-action="ai-style">
                        <span class="tool-icon">🎭</span>
                        <span class="tool-label">Style</span>
                    </button>
                </div>
                <div class="input-group" style="margin-top: var(--space-md);">
                    <label class="input-label">OpenAI API Key</label>
                    <input type="password" class="input-field" id="apiKey" placeholder="Enter your API key">
                    <button class="tool-btn" id="saveApiKey" style="width: 100%; margin-top: var(--space-sm);">
                        <span class="tool-icon">💾</span>
                        <span class="tool-label">Save API Key</span>
                    </button>
                </div>
            </section>

            <!-- AI Status -->
            <section class="tool-section" id="aiStatus">
                <div class="tool-section-header">
                    <h3>
                        <span class="tool-section-icon">🤖</span>
                        AI Status
                    </h3>
                </div>
                <div id="aiStatusContent"></div>
            </section>

            <!-- Export Options -->
            <section class="tool-section">
                <div class="tool-section-header">
                    <h3>
                        <span class="tool-section-icon">💾</span>
                        Export Options
                    </h3>
                </div>
                <div class="tool-grid tool-grid-2x">
                    <button class="tool-btn" data-export="ascii">
                        <span class="tool-icon">📄</span>
                        <span class="tool-label">ASCII</span>
                    </button>
                    <button class="tool-btn" data-export="png">
                        <span class="tool-icon">🖼️</span>
                        <span class="tool-label">PNG</span>
                    </button>
                    <button class="tool-btn" data-export="svg">
                        <span class="tool-icon">🎨</span>
                        <span class="tool-label">SVG</span>
                    </button>
                    <button class="tool-btn" data-export="txt">
                        <span class="tool-icon">📝</span>
                        <span class="tool-label">TXT</span>
                    </button>
                </div>
            </section>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Canvas Header -->
            <header class="header">
                <div class="header-info">
                    <span>Position: <span id="cursorPos">0, 0</span></span>
                    <span>Tool: <span id="currentTool">Freehand</span></span>
                    <span>Zoom: <span id="zoomLevel">100%</span></span>
                    <span>Size: <span id="canvasSize">200×80</span></span>
                </div>
                <div class="header-info">
                    <button class="header-btn" id="zoomInBtn">🔍+</button>
                    <button class="header-btn" id="zoomOutBtn">🔍-</button>
                    <button class="header-btn" id="zoomResetBtn">100%</button>
                </div>
            </header>

            <!-- Canvas Container -->
            <div class="canvas-container">
                <div class="canvas-wrapper">
                    <canvas id="canvas"></canvas>
                </div>
            </div>

            <!-- Status Bar -->
            <footer class="status-bar">
                <span>Chars: <span id="charCount">0</span></span>
                <span>Lines: <span id="lineCount">0</span></span>
                <span>Selection: <span id="selectionInfo">None</span></span>
                <span>Brush: <span id="brushInfo">1px Solid</span></span>
            </footer>
        </main>
    </div>

    <script>
        // =============================================
           CANVAS SETUP
           =============================================
        
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        
        // Canvas dimensions
        var COLS = 200;
        var ROWS = 80;
        var charWidth = 8;
        var charHeight = 12;
        var zoomLevel = 1.0;
        
        canvas.width = COLS * charWidth;
        canvas.height = ROWS * charHeight;
        
        // Grid data
        var grid = Array(ROWS).fill(null).map(function() { 
            return Array(COLS).fill(' '); 
        });
        
        // Current state
        var currentTool = 'freehand';
        var currentChar = '*';
        var isDrawing = false;
        var lastPos = null;
        var startPos = null;
        var selectedCharIndex = 0;
        var clipboard = null;
        var apiKey = localStorage.getItem('openai_api_key') || '';
        var aiStatus = 'idle';
        var selection = null;
        var undoStack = [];
        var redoStack = [];
        var MAX_HISTORY = 50;
        var brushSize = 1;
        var brushStyle = 'solid';
        var drawingPath = [];
        
        // Character palette
        var charPalette = [
            ' ', '.', ',', ':', ';', '-', '=', '+', '*', '#', '@', '%', '$', '&', '0', 'O',
            '│', '─', '┌', '┐', '└', '┘', '├', '┤', '┬', '┴', '┼', '╭', '╮', '╰', '╯',
            '█', '▓', '▒', '░', '■', '□', '◆', '◇', '▲', '▼', '▶', '◀', '★', '☆', '→', '←',
            '(', ')', '[', ']', '{', '}', '<', '>', '/', '\\', '|', '_', '~', '`', '"', "'",

        // =============================================
           CHARACTER PALETTE
           =============================================
        
        function initCharPalette() {
            var palette = document.getElementById('char-palette');
            charPalette.forEach(function(ch, i) {
                var btn = document.createElement('button');
                btn.className = 'tool-btn';
                btn.textContent = ch === ' ' ? '␣' : ch;
                btn.title = ch === ' ' ? 'Space' : ch;
                if (i === selectedCharIndex) btn.classList.add('active');
                
                btn.addEventListener('click', function() {
                    currentChar = ch;
                    selectedCharIndex = i;
                    var buttons = document.querySelectorAll('#char-palette .tool-btn');
                    buttons.forEach(function(b) { 
                        b.classList.remove('active'); 
                    });
                    btn.classList.add('active');
                    updateBrushInfo();
                });
                
                palette.appendChild(btn);
            });
        }
        
        // =============================================
           RENDERING SYSTEM
           =============================================
        
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Apply zoom
            ctx.save();
            ctx.scale(zoomLevel, zoomLevel);
            
            // Draw background
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.fillStyle = '#ffffff';
            ctx.font = '12px JetBrains Mono';
            
            for (var row = 0; row < ROWS; row++) {
                for (var col = 0; col < COLS; col++) {
                    var char = grid[row][col];
                    if (char !== ' ') {
                        ctx.fillText(char, col * charWidth, row * charHeight);
                    }
                }
            }
            
            // Draw selection
            if (selection) {
                ctx.strokeStyle = '#00d4aa';
                ctx.lineWidth = 2;
                ctx.strokeRect(
                    selection.startCol * charWidth,
                    selection.startRow * charHeight,
                    (selection.endCol - selection.startCol + 1) * charWidth,
                    (selection.endRow - selection.startRow + 1) * charHeight
                );
            }
            
            ctx.restore();
            updateInfo();
        }
        
        // =============================================
           INFO UPDATES
           =============================================
        
        function updateInfo() {
            document.getElementById('cursorPos').textContent = 
                lastPos ? lastPos.col + ', ' + lastPos.row : '0, 0';
            
            var toolName = currentTool.charAt(0).toUpperCase() + currentTool.slice(1);
            if (currentChar !== ' ') {
                toolName += ' (' + currentChar + ')';
            } else {
                toolName += ' (space)';
            }
            document.getElementById('currentTool').textContent = toolName;
            document.getElementById('zoomLevel').textContent = Math.round(zoomLevel * 100) + '%';
            
            // Count characters and lines
            var charCount = 0;
            var lineCount = 0;
            
            for (var row = 0; row < ROWS; row++) {
                var hasContent = false;
                for (var col = 0; col < COLS; col++) {
                    if (grid[row][col] !== ' ') {
                        charCount++;
                        hasContent = true;
                    }
                }
                if (hasContent) {
                    lineCount++;
                }
            }
            
            document.getElementById('canvasSize').textContent = COLS + '×' + ROWS;
            document.getElementById('charCount').textContent = charCount;
            document.getElementById('lineCount').textContent = lineCount;
            
            // Selection info
            if (selection) {
                var width = selection.endCol - selection.startCol + 1;
                var height = selection.endRow - selection.startRow + 1;
                document.getElementById('selectionInfo').textContent = width + '×' + height;
            } else {
                document.getElementById('selectionInfo').textContent = 'None';
            }
        }
        
        function updateBrushInfo() {
            var sizeText = brushSize + 'px';
            var styleText = brushStyle.charAt(0).toUpperCase() + brushStyle.slice(1);
            document.getElementById('brushInfo').textContent = sizeText + ' ' + styleText;
        }
        
        // =============================================
           DRAWING FUNCTIONS
           =============================================
        
        function drawChar(row, col, char) {
            if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
                grid[row][col] = char;
                render();
            }
        }
        
        function drawBrush(row, col) {
            if (brushSize === 1) {
                drawChar(row, col, currentChar);
                return;
            }
            
            var radius = Math.floor(brushSize / 2);
            for (var r = -radius; r <= radius; r++) {
                for (var c = -radius; c <= radius; c++) {
                    var targetRow = row + r;
                    var targetCol = col + c;
                    
                    // Apply brush style
                    var shouldDraw = false;
                    if (brushStyle === 'solid') {
                        shouldDraw = true;
                    } else if (brushStyle === 'dotted') {
                        shouldDraw = (r + c) % 2 === 0;
                    } else if (brushStyle === 'dashed') {
                        shouldDraw = r % 2 === 0 || c % 2 === 0;
                    } else if (brushStyle === 'shaded') {
                        var distance = Math.sqrt(r * r + c * c);
                        shouldDraw = distance <= radius && (r + c) % 3 === 0;
                    }
                    
                    if (shouldDraw) {
                        drawChar(targetRow, targetCol, currentChar);
                    }
                }
            }
        }
        
        function drawLine(x0, y0, x1, y1, char) {
            saveUndo();
            
            var dx = Math.abs(x1 - x0);
            var dy = Math.abs(y1 - y0);
            var sx = x0 < x1 ? 1 : -1;
            var sy = y0 < y1 ? 1 : -1;
            var err = dx - dy;
            
            while (true) {
                if (x0 >= 0 && x0 < COLS && y0 >= 0 && y0 < ROWS) {
                    grid[y0][x0] = char || currentChar;
                }
                if (x0 === x1 && y0 === y1) break;
                
                var e2 = 2 * err;
                if (e2 > -dy) { 
                    err -= dy; 
                    x0 += sx; 
                }
                if (e2 < dx) { 
                    err += dx; 
                    y0 += sy; 
                }
            }
            render();
        }
        
        function drawRectangle(x0, y0, x1, y1, char, filled) {
            saveUndo();
            
            var minX = Math.min(x0, x1);
            var maxX = Math.max(x0, x1);
            var minY = Math.min(y0, y1);
            var maxY = Math.max(y0, y1);
            
            for (var y = minY; y <= maxY; y++) {
                for (var x = minX; x <= maxX; x++) {
                    if (filled || y === minY || y === maxY || x === minX || x === maxX) {
                        if (y >= 0 && y < ROWS && x >= 0 && x < COLS) {
                            grid[y][x] = char || currentChar;
                        }
                    }
                }
            }
            render();
        }
        
        function drawCircle(centerX, centerY, radius, char, filled) {
            saveUndo();
            
            for (var y = 0; y < ROWS; y++) {
                for (var x = 0; x < COLS; x++) {
                    var distance = Math.sqrt(Math.pow(x - centerX, 2) + Math.pow(y - centerY, 2));
                    var shouldDraw = filled ? distance <= radius : Math.abs(distance - radius) < 1;
                    
                    if (shouldDraw && y >= 0 && y < ROWS && x >= 0 && x < COLS) {
                        grid[y][x] = char || currentChar;
                    }
                }
            }
            render();
        }
        
        function startTextInput(row, col) {
            var input = document.createElement('input');
            input.type = 'text';
            input.style.position = 'absolute';
            input.style.left = canvas.offsetLeft + col * charWidth * zoomLevel + 2 + 'px';
            input.style.top = canvas.offsetTop + row * charHeight * zoomLevel - 2 + 'px';
            input.style.font = '12px JetBrains Mono';
            input.style.background = 'rgba(0, 212, 170, 0.25)';
            input.style.color = '#fff';
            input.style.border = '1px solid #00d4aa';
            input.style.padding = '1px 4px';
            input.style.width = '240px';
            input.style.height = charHeight + 2 + 'px';
            input.style.lineHeight = charHeight + 'px';
            input.style.zIndex = '1000';

            document.body.appendChild(input);
            input.focus();
            input.select();

            var committed = false;

            var commit = function() {
                if (committed) return;
                committed = true;
                var text = input.value.trim();
                if (text) {
                    saveUndo();
                    for (var i = 0; i < text.length; i++) {
                        var c = col + i;
                        if (c < COLS && row < ROWS) {
                            grid[row][c] = text[i];
                        }
                    }
                    render();
                }
                document.body.removeChild(input);
            };

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    commit();
                } else if (e.key === 'Escape') {
                    commit();
                }
            });

            input.addEventListener('blur', commit);
        }
        
        function floodFill(startRow, startCol, targetChar, replacementChar) {
            if (startRow < 0 || startRow >= ROWS || startCol < 0 || startCol >= COLS) return;
            if (grid[startRow][startCol] !== targetChar) return;
            if (targetChar === replacementChar) return;
            
            var stack = [[startRow, startCol]];
            var visited = new Set();
            
            while (stack.length > 0) {
                var item = stack.pop();
                var row = item[0];
                var col = item[1];
                var key = row + ',' + col;
                
                if (visited.has(key)) continue;
                visited.add(key);
                
                if (row < 0 || row >= ROWS || col < 0 || col >= COLS) continue;
                if (grid[row][col] !== targetChar) continue;
                
                grid[row][col] = replacementChar;
                
                stack.push([row - 1, col]);
                stack.push([row + 1, col]);
                stack.push([row, col - 1]);
                stack.push([row, col + 1]);
            }
            render();
        }
        
        function getMousePos(e) {
            var rect = canvas.getBoundingClientRect();
            return {
                col: Math.floor((e.clientX - rect.left) / (charWidth * zoomLevel)),
                row: Math.floor((e.clientY - rect.top) / (charHeight * zoomLevel))
            };
        }
        
        // =============================================
           TOOL FUNCTIONS
           =============================================
        
        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(function(btn) {
                btn.classList.remove('active');
            });
            var toolBtn = document.querySelector('[data-tool="' + tool + '"]');
            if (toolBtn) toolBtn.classList.add('active');
        }
        
        function clearCanvas() {
            saveUndo();
            grid = Array(ROWS).fill(null).map(function() { 
                return Array(COLS).fill(' '); 
            });
            render();
        }
        
        function fillCanvas() {
            saveUndo();
            for (var row = 0; row < ROWS; row++) {
                for (var col = 0; col < COLS; col++) {
                    grid[row][col] = currentChar;
                }
            }
            render();
        }
        
        function saveUndo() {
            var state = grid.map(function(row) { 
                return row.slice(); 
            });
            undoStack.push(state);
            if (undoStack.length > MAX_HISTORY) {
                undoStack.shift();
            }
            redoStack = [];
        }
        
        function undo() {
            if (undoStack.length > 0) {
                redoStack.push(grid.map(function(row) { 
                    return row.slice(); 
                }));
                grid = undoStack.pop();
                render();
            }
        }
        
        function redo() {
            if (redoStack.length > 0) {
                undoStack.push(grid.map(function(row) { 
                    return row.slice(); 
                }));
                grid = redoStack.pop();
                render();
            }
        }
        
        function setZoom(level) {
            zoomLevel = Math.max(0.5, Math.min(3.0, level));
            canvas.style.transform = 'scale(' + zoomLevel + ')';
            render();
        }
        
        // =============================================
           AI FUNCTIONS
           =============================================
        
        function updateAIStatus(message, type) {
            type = type || 'info';
            var statusDiv = document.getElementById('aiStatus');
            var contentDiv = document.getElementById('aiStatusContent');
            
            if (statusDiv && contentDiv) {
                statusDiv.style.display = 'block';
                contentDiv.innerHTML = message;
                
                if (type === 'error') {
                    contentDiv.style.background = 'rgba(255, 107, 107, 0.2)';
                    contentDiv.style.color = '#fff';
                } else if (type === 'success') {
                    contentDiv.style.background = 'rgba(0, 200, 83, 0.2)';
                    contentDiv.style.color = '#fff';
                } else {
                    contentDiv.style.background = 'var(--bg-surface-2)';
                    contentDiv.style.color = 'var(--text-secondary)';
                }
            }
        }
        
        function callOpenAI(prompt) {
            if (!apiKey) {
                updateAIStatus('⚠️ Please enter your OpenAI API key first', 'error');
                return Promise.resolve(null);
            }
            
            updateAIStatus('🤖 Processing your request...', 'info');
            
            var requestBody = {
                model: 'gpt-3.5-turbo',
                messages: [{
                    role: 'user',
                    content: prompt
                }],
                max_tokens: 1000,
                temperature: 0.7
            };
            
            return fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + apiKey
                },
                body: JSON.stringify(requestBody)
            })
            .then(function(response) { 
                return response.json(); 
            })
            .then(function(data) {
                if (data.choices && data.choices[0]) {
                    var aiResponse = data.choices[0].message.content;
                    updateAIStatus('✅ AI response received', 'success');
                    return aiResponse;
                } else {
                    var errorMsg = data.error && data.error.message ? data.error.message : 'Unknown error';
                    updateAIStatus('❌ Error: ' + errorMsg, 'error');
                    return null;
                }
            })
            .catch(function(error) {
                updateAIStatus('❌ Network error: ' + error.message, 'error');
                return null;
            });
        }
        
        // =============================================
           EXPORT FUNCTIONS
           =============================================
        
        function exportASCII() {
            var content = grid.map(function(row) { 
                return row.join(''); 
            }).join('\n');
            var blob = new Blob([content], { type: 'text/plain' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'ascii-art-' + Date.now() + '.txt';
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function exportPNG() {
            var link = document.createElement('a');
            link.download = 'ascii-art-' + Date.now() + '.png';
            link.href = canvas.toDataURL();
            link.click();
        }
        
        function exportSVG() {
            var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + canvas.width + '" height="' + canvas.height + '">';
            svg += '<rect width="100%" height="100%" fill="#0a0a0a"/>';
            svg += '<text x="0" y="0" font-family="JetBrains Mono" font-size="12" fill="white">';
            
            for (var row = 0; row < ROWS; row++) {
                for (var col = 0; col < COLS; col++) {
                    var char = grid[row][col];
                    if (char !== ' ') {
                        svg += '<tspan x="' + (col * charWidth) + '" y="' + ((row + 1) * charHeight) + '">' + char + '</tspan>';
                    }
                }
            }
            
            svg += '</text></svg>';
            
            var blob = new Blob([svg], { type: 'image/svg+xml' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'ascii-art-' + Date.now() + '.svg';
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // =============================================
           EVENT LISTENERS
           =============================================
        
        // Tool selection
        document.querySelectorAll('[data-tool]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                setTool(btn.dataset.tool);
            });
        });
        
        // Brush settings
        document.getElementById('brushSize').addEventListener('change', function(e) {
            brushSize = parseInt(e.target.value);
            updateBrushInfo();
        });
        
        document.getElementById('brushStyle').addEventListener('change', function(e) {
            brushStyle = e.target.value;
            updateBrushInfo();
        });
        
        // Quick actions
        document.querySelectorAll('[data-action]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var action = btn.dataset.action;
                switch (action) {
                    case 'clear': 
                        clearCanvas(); 
                        break;
                    case 'fill-all': 
                        fillCanvas(); 
                        break;
                    case 'invert': 
                        saveUndo();
                        for (var r = 0; r < ROWS; r++) {
                            for (var c = 0; c < COLS; c++) {
                                var char = grid[r][c];
                                if (char !== ' ') {
                                    grid[r][c] = char === char.toUpperCase() ? 
                                        char.toLowerCase() : char.toUpperCase();
                                }
                            }
                        }
                        render();
                        break;
                    case 'mirror-h':
                        saveUndo();
                        for (var r = 0; r < ROWS; r++) {
                            for (var c = 0; c < Math.floor(COLS / 2); c++) {
                                var temp = grid[r][c];
                                grid[r][c] = grid[r][COLS - 1 - c];
                                grid[r][COLS - 1 - c] = temp;
                            }
                        }
                        render();
                        break;
                    case 'mirror-v':
                        saveUndo();
                        for (var r = 0; r < Math.floor(ROWS / 2); r++) {
                            var temp = grid[r];
                            grid[r] = grid[ROWS - 1 - r];
                            grid[ROWS - 1 - r] = temp;
                        }
                        render();
                        break;
                    case 'rotate':
                        saveUndo();
                        var newGrid = Array(COLS).fill(null).map(function() { 
                            return Array(ROWS).fill(' '); 
                        });
                        for (var r = 0; r < ROWS; r++) {
                            for (var c = 0; c < COLS; c++) {
                                newGrid[c][ROWS - 1 - r] = grid[r][c];
                            }
                        }
                        grid = newGrid;
                        var temp = COLS;
                        COLS = ROWS;
                        ROWS = temp;
                        canvas.width = COLS * charWidth;
                        canvas.height = ROWS * charHeight;
                        render();
                        break;
                    case 'center':
                        saveUndo();
                        var minX = COLS, maxX = 0, minY = ROWS, maxY = 0;
                        for (var r = 0; r < ROWS; r++) {
                            for (var c = 0; c < COLS; c++) {
                                if (grid[r][c] !== ' ') {
                                    minX = Math.min(minX, c);
                                    maxX = Math.max(maxX, c);
                                    minY = Math.min(minY, r);
                                    maxY = Math.max(maxY, r);
                                }
                            }
                        }
                        if (minX <= maxX && minY <= maxY) {
                            var width = maxX - minX + 1;
                            var height = maxY - minY + 1;
                            var offsetX = Math.floor((COLS - width) / 2) - minX;
                            var offsetY = Math.floor((ROWS - height) / 2) - minY;
                            var newGrid = Array(ROWS).fill(null).map(function() { 
                                return Array(COLS).fill(' '); 
                            });
                            for (var r = 0; r < ROWS; r++) {
                                for (var c = 0; c < COLS; c++) {
                                    var newR = r + offsetY;
                                    var newC = c + offsetX;
                                    if (newR >= 0 && newR < ROWS && newC >= 0 && newC < COLS) {
                                        newGrid[newR][newC] = grid[r][c];
                                    }
                                }
                            }
                            grid = newGrid;
                            render();
                        }
                        break;
                    case 'random':
                        saveUndo();
                        var chars = ['*', '#', '@', '%', '&', '+', '=', ':', '.', 'o'];
                        for (var r = 0; r < ROWS; r++) {
                            for (var c = 0; c < COLS; c++) {
                                if (Math.random() < 0.1) {
                                    grid[r][c] = chars[Math.floor(Math.random() * chars.length)];
                                }
                            }
                        }
                        render();
                        break;
                    case 'ai-generate':
                        var prompt = 'Generate creative ASCII art. Include details, shading, and make it visually appealing.';
                        callOpenAI(prompt).then(function(response) {
                            if (response) {
                                saveUndo();
                                var lines = response.split('\n');
                                var startRow = Math.floor((ROWS - lines.length) / 2);
                                var maxLineLength = Math.max.apply(Math, lines.map(function(line) { 
                                    return line.length; 
                                }));
                                var startCol = Math.floor((COLS - maxLineLength) / 2);
                                
                                for (var r = 0; r < lines.length && startRow + r < ROWS; r++) {
                                    for (var c = 0; c < lines[r].length && startCol + c < COLS; c++) {
                                        grid[startRow + r][startCol + c] = lines[r][c];
                                    }
                                }
                                render();
                            }
                        });
                        break;
                    case 'ai-enhance':
                        updateAIStatus('✨ Select an area to enhance', 'info');
                        break;
                    case 'ai-complete':
                        updateAIStatus('🔮 Select an area to complete', 'info');
                        break;
                    case 'ai-style':
                        updateAIStatus('🎭 Select an area to apply style', 'info');
                        break;
                }
            });
        });
        
        // Export options
        document.querySelectorAll('[data-export]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var format = btn.dataset.export;
                switch (format) {
                    case 'ascii': 
                        exportASCII(); 
                        break;
                    case 'png': 
                        exportPNG(); 
                        break;
                    case 'svg': 
                        exportSVG(); 
                        break;
                    case 'txt': 
                        exportASCII(); 
                        break;
                }
            });
        });
        
        // API Key management
        document.getElementById('saveApiKey').addEventListener('click', function() {
            var keyInput = document.getElementById('apiKey');
            var key = keyInput.value.trim();
            if (key) {
                localStorage.setItem('openai_api_key', key);
                apiKey = key;
                updateAIStatus('✅ API Key saved successfully', 'success');
            }
        });
        
        // Canvas mouse events - IMPROVED FREEHAND DRAWING
        canvas.addEventListener('mousedown', function(e) {
            isDrawing = true;
            startPos = getMousePos(e);
            lastPos = startPos;
            drawingPath = [startPos];

            if (currentTool === 'freehand') {
                saveUndo();
                drawBrush(startPos.row, startPos.col);
            } else if (currentTool === 'text') {
                startTextInput(startPos.row, startPos.col);
                isDrawing = false;
            } else if (currentTool === 'fill') {
                var pos = getMousePos(e);
                saveUndo();
                floodFill(pos.row, pos.col, grid[pos.row][pos.col], currentChar);
                isDrawing = false;
            } else if (currentTool === 'select') {
                selection = {
                    startRow: startPos.row,
                    startCol: startPos.col,
                    endRow: startPos.row,
                    endCol: startPos.col
                };
            }
        });
        
        canvas.addEventListener('mousemove', function(e) {
            var pos = getMousePos(e);
            lastPos = pos;

            if (!isDrawing) return;

            if (currentTool === 'freehand') {
                // Draw continuous line from last position to current position
                if (pos.row !== lastPos.row || pos.col !== lastPos.col) {
                    drawLine(lastPos.col, lastPos.row, pos.col, pos.row, currentChar);
                    lastPos = pos;
                    drawingPath.push(pos);
                }
            } else if (currentTool === 'select' && selection) {
                selection.endRow = pos.row;
                selection.endCol = pos.col;
                render();
            }
        });
        
        canvas.addEventListener('mouseup', function(e) {
            if (!isDrawing) return;
            isDrawing = false;

            var endPos = getMousePos(e);

            if (currentTool === 'line') {
                drawLine(startPos.col, startPos.row, endPos.col, endPos.row);
            } else if (currentTool === 'rectangle') {
                drawRectangle(startPos.col, startPos.row, endPos.col, endPos.row, currentChar, false);
            } else if (currentTool === 'filled-rectangle') {
                drawRectangle(startPos.col, startPos.row, endPos.col, endPos.row, currentChar, true);
            } else if (currentTool === 'circle') {
                var radius = Math.round(Math.sqrt(
                    Math.pow(endPos.col - startPos.col, 2) + 
                    Math.pow(endPos.row - startPos.row, 2)
                ));
                drawCircle(startPos.col, startPos.row, radius, currentChar, false);
            } else if (currentTool === 'ellipse') {
                // Simple ellipse implementation
                var radiusX = Math.abs(endPos.col - startPos.col);
                var radiusY = Math.abs(endPos.row - startPos.row);
                saveUndo();
                for (var y = 0; y < ROWS; y++) {
                    for (var x = 0; x < COLS; x++) {
                        var normalizedX = (x - startPos.col) / radiusX;
                        var normalizedY = (y - startPos.row) / radiusY;
                        if (normalizedX * normalizedX + normalizedY * normalizedY <= 1) {
                            if (y >= 0 && y < ROWS && x >= 0 && x < COLS) {
                                grid[y][x] = currentChar;
                            }
                        }
                    }
                }
                render();
            } else if (currentTool === 'select' && selection) {
                // Normalize selection
                var tempRow = selection.startRow;
                var tempCol = selection.startCol;
                selection.startRow = Math.min(selection.startRow, selection.endRow);
                selection.startCol = Math.min(selection.startCol, selection.endCol);
                selection.endRow = Math.max(tempRow, selection.endRow);
                selection.endCol = Math.max(tempCol, selection.endCol);
                render();
            }

            startPos = null;
            drawingPath = [];
        });
        
        canvas.addEventListener('mouseleave', function() {
            isDrawing = false;
            drawingPath = [];
        });
        
        // Header buttons
        document.getElementById('undoBtn').addEventListener('click', undo);
        document.getElementById('redoBtn').addEventListener('click', redo);
        document.getElementById('saveBtn').addEventListener('click', exportASCII);
        
        // Zoom controls
        document.getElementById('zoomInBtn').addEventListener('click', function() {
            setZoom(zoomLevel + 0.25);
        });
        
        document.getElementById('zoomOutBtn').addEventListener('click', function() {
            setZoom(zoomLevel - 0.25);
        });
        
        document.getElementById('zoomResetBtn').addEventListener('click', function() {
            setZoom(1.0);
        });
        
        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey || e.metaKey) {
                switch (e.key) {
                    case 'z':
                        e.preventDefault();
                        if (e.shiftKey) {
                            redo();
                        } else {
                            undo();
                        }
                        break;
                    case 's':
                        e.preventDefault();
                        exportASCII();
                        break;
                    case '=':
                    case '+':
                        e.preventDefault();
                        setZoom(zoomLevel + 0.25);
                        break;
                    case '-':
                        e.preventDefault();
                        setZoom(zoomLevel - 0.25);
                        break;
                    case '0':
                        e.preventDefault();
                        setZoom(1.0);
                        break;
                }
            }
        });
        
        // =============================================
           INITIALIZATION
           =============================================
        
        // Initialize character palette
        initCharPalette();
        
        // Load saved API key
        var savedKey = localStorage.getItem('openai_api_key');
        if (savedKey) {
            apiKey = savedKey;
            document.getElementById('apiKey').value = savedKey;
        }
        
        // Set initial tool
        setTool('freehand');
        
        // Initialize brush info
        updateBrushInfo();
        
        // Initial render
        render();
        
        // Focus canvas for keyboard input
        canvas.focus();
        
        console.log('ASCII Canvas Studio v10.0 - Improved UI/UX and Freehand Drawing!');
    </script>
</body>
</html>
